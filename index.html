<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AboneroApp - Sistema Maestro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style id="dynamic-styles">
        /* Variables por defecto - Se sobreescriben con JS */
        :root { 
            --accent-color: #3483fa; 
            --header-bg: #fff159; 
            --body-bg: #ebebeb; 
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--body-bg); color: var(--text-color); margin: 0; transition: 0.3s; }
        
        /* Header y Sidebar */
        header { background: var(--header-bg); padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top:0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 5px 10px; }
        .brand-name { font-weight: bold; font-size: 18px; text-transform: uppercase; flex-grow: 1; text-align: center; }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 1000; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar.open { left: 0; }
        .sidebar-header { background: var(--header-bg); padding: 20px; text-align: center; font-weight: bold; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Tarjetas y Elementos */
        .box { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn { border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 5px; }
        .btn-accent { background: var(--accent-color); color: white; }

        .cliente-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 12px; border-left: 6px solid var(--accent-color); overflow: hidden; }
        .cliente-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; }
        
        .articulo-container { display: none; padding: 10px; background: rgba(0,0,0,0.02); border-top: 1px solid #eee; }
        .articulo-card { background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; padding: 10px; }
        .abono-seccion { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; }

        /* Modales */
        #modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; max-width:400px; border-radius:15px; overflow:hidden; }

        /* Ticket */
        #ticket-print { position: absolute; left: -9999px; width: 350px; background: white; padding: 25px; text-align: center; color: black; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header" id="side-title">MENÚ</div>
    <div class="sidebar-menu">
        <div class="menu-item" onclick="showView('view-ruta')">📍 Mi Ruta de Cobro</div>
        <div class="menu-item" onclick="showView('view-venta')">➕ Nueva Venta</div>
        <div class="menu-item" onclick="showView('view-config')">⚙️ Personalización Total</div>
    </div>
</div>

<header>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="brand-name" id="header-title">ABONERO APP</div>
</header>

<div class="container">
    
    <div id="view-ruta" class="view active">
        <button class="btn btn-accent" style="background:#00b894; margin-bottom:15px" onclick="optimizarRuta()">📍 ORDENAR POR CERCANÍA GPS</button>
        <div id="lista-clientes"></div>
    </div>

    <div id="view-venta" class="view">
        <div class="box">
            <h4>➕ Registrar Venta</h4>
            <input type="text" id="reg-nombre" placeholder="Nombre del Cliente">
            <input type="text" id="reg-dir" placeholder="Dirección">
            <input type="text" id="reg-mueble" placeholder="Artículo">
            <input type="number" id="reg-saldo" placeholder="Saldo Total $">
            <button class="btn btn-accent" onclick="registrarVenta()">GUARDAR CLIENTE</button>
        </div>
    </div>

    <div id="view-config" class="view">
        <div class="box">
            <h4>⚙️ Configuración Maestra</h4>
            <input type="text" id="cfg-nombre" placeholder="Nombre de la App">
            
            <label>Color de Acento (Botones):</label>
            <input type="color" id="cfg-color-accent">
            
            <label>Color de Encabezado:</label>
            <input type="color" id="cfg-color-header">

            <label>Color de Fondo de Pantalla:</label>
            <input type="color" id="cfg-color-bg">

            <label>Logotipo:</label>
            <input type="file" id="cfg-logo" accept="image/*" onchange="previewLogo(event)">
            <img id="logo-prev" style="max-height:60px; display:none; margin:10px auto;">

            <button class="btn btn-accent" onclick="confirmarCambios()">APLICAR CAMBIOS Y GUARDAR MEMORIA</button>
        </div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-box">
        <div id="modal-header" style="padding:15px; font-weight:bold; text-align:center; background:var(--header-bg);">AboneroApp</div>
        <div id="modal-body" style="padding:20px; font-size:15px;"></div>
        <div id="modal-footer" style="padding:10px; border-top:1px solid #eee;"></div>
    </div>
</div>

<div id="ticket-print">
    <img id="t-logo" style="max-height:70px; display:none; margin:0 auto 10px;">
    <h2 id="t-muebleria"></h2>
    <hr>
    <div style="text-align:left; font-size:14px;">
        <p><strong>CLIENTE:</strong> <span id="t-cliente"></span></p>
        <p><strong>DIRECCIÓN:</strong> <span id="t-dir"></span></p>
        <p><strong>ARTÍCULO:</strong> <span id="t-art"></span></p>
        <hr>
        <p>ANT: <span id="t-ant"></span> | ABONO: <span id="t-abo"></span></p>
        <p style="font-size:20px; background:#eee; padding:10px; text-align:center;"><strong>SALDO: <span id="t-act"></span></strong></p>
    </div>
</div>

<script>
    // MEMORIA MAESTRA (Claves Únicas)
    const KEY_DB = "ABONERO_MASTER_DATA";
    const KEY_CFG = "ABONERO_MASTER_CONFIG";

    let db = JSON.parse(localStorage.getItem(KEY_DB)) || {};
    let config = JSON.parse(localStorage.getItem(KEY_CFG)) || {
        nombre: "ABONERO APP",
        accent: "#3483fa",
        header: "#fff159",
        bg: "#ebebeb",
        logo: ""
    };

    function init() {
        aplicarEstetica();
        render();
    }

    function aplicarEstetica() {
        const r = document.documentElement.style;
        r.setProperty('--accent-color', config.accent);
        r.setProperty('--header-bg', config.header);
        r.setProperty('--body-bg', config.bg);
        
        document.getElementById('header-title').innerText = config.nombre;
        document.getElementById('side-title').innerText = config.nombre;
        document.getElementById('cfg-nombre').value = config.nombre;
        document.getElementById('cfg-color-accent').value = config.accent;
        document.getElementById('cfg-color-header').value = config.header;
        document.getElementById('cfg-color-bg').value = config.bg;
        
        if(config.logo) {
            document.getElementById('logo-prev').src = config.logo;
            document.getElementById('logo-prev').style.display = 'block';
            document.getElementById('t-logo').src = config.logo;
            document.getElementById('t-logo').style.display = 'block';
        }
    }

    function previewLogo(e) {
        const reader = new FileReader();
        reader.onload = () => {
            config.logo = reader.result;
            document.getElementById('logo-prev').src = config.logo;
            document.getElementById('logo-prev').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function confirmarCambios() {
        config.nombre = document.getElementById('cfg-nombre').value.toUpperCase();
        config.accent = document.getElementById('cfg-color-accent').value;
        config.header = document.getElementById('cfg-color-header').value;
        config.bg = document.getElementById('cfg-color-bg').value;
        
        localStorage.setItem(KEY_CFG, JSON.stringify(config));
        aplicarEstetica();
        lanzarModal("✅ Configuración guardada en la memoria permanente.");
    }

    function registrarVenta() {
        const n = document.getElementById('reg-nombre').value.toUpperCase().trim();
        const d = document.getElementById('reg-dir').value.trim();
        const m = document.getElementById('reg-mueble').value.trim();
        const s = parseFloat(document.getElementById('reg-saldo').value);

        if(!n || !m || isNaN(s)) return lanzarModal("⚠️ Datos incompletos.");

        navigator.geolocation.getCurrentPosition(pos => {
            if(!db[n]) db[n] = { nombre: n, direccion: d, lat: pos.coords.latitude, lon: pos.coords.longitude, articulos: [] };
            db[n].articulos.push({ id: Date.now(), mueble: m, saldo: s, historial: [] });
            
            localStorage.setItem(KEY_DB, JSON.stringify(db));
            render();
            lanzarModal("✅ Cliente registrado.");
            document.querySelectorAll('#view-venta input').forEach(i => i.value = "");
            showView('view-ruta');
        }, () => lanzarModal("❌ Error GPS. Activa ubicación."));
    }

    function render() {
        const root = document.getElementById('lista-clientes');
        root.innerHTML = "";
        
        Object.values(db).forEach(cli => {
            let artsHtml = cli.articulos.map(a => `
                <div class="articulo-card">
                    <div style="display:flex; justify-content:space-between" onclick="toggleEl('abono-${a.id}')">
                        <strong>📦 ${a.mueble}</strong>
                        <b style="color:var(--accent-color)">$${a.saldo}</b>
                    </div>
                    <div id="abono-${a.id}" class="abono-seccion">
                        <input type="number" id="inp-${a.id}" placeholder="Monto a abonar $">
                        <button class="btn btn-accent" onclick="ejecutarAbono('${cli.nombre}', ${a.id})">REGISTRAR ABONO</button>
                        <div style="margin-top:10px; font-size:11px">
                            ${a.historial.map(h => `<div>${h.fecha.split(',')[0]} - Abono: $${h.monto} | Saldo: $${h.act}</div>`).reverse().join('')}
                        </div>
                    </div>
                </div>
            `).join('');

            root.innerHTML += `
                <div class="cliente-card">
                    <div class="cliente-header" onclick="toggleEl('cli-${cli.nombre.replace(/\s/g,'')}')">
                        <div><strong>${cli.nombre}</strong><br><small>${cli.direccion}</small></div>
                        <span>▼</span>
                    </div>
                    <div id="cli-${cli.nombre.replace(/\s/g,'')}" class="articulo-container">
                        ${artsHtml}
                    </div>
                </div>
            `;
        });
    }

    function ejecutarAbono(cliente, artId) {
        const monto = parseFloat(document.getElementById(`inp-${artId}`).value);
        if(!monto) return;

        const a = db[cliente].articulos.find(x => x.id === artId);
        const ant = a.saldo;
        a.saldo = (ant - monto).toFixed(2);
        const fecha = new Date().toLocaleString();
        
        a.historial.push({ fecha, ant, monto, act: a.saldo });
        localStorage.setItem(KEY_DB, JSON.stringify(db));
        render();
        generarTicket(cliente, a.mueble, ant, monto, a.saldo, fecha);
    }

    function generarTicket(cli, m, ant, abo, act, f) {
        document.getElementById('t-muebleria').innerText = config.nombre;
        document.getElementById('t-cliente').innerText = cli;
        document.getElementById('t-dir').innerText = db[cli].direccion;
        document.getElementById('t-art').innerText = m;
        document.getElementById('t-ant').innerText = "$" + ant;
        document.getElementById('t-abo').innerText = "$" + abo;
        document.getElementById('t-act').innerText = "$" + act;

        setTimeout(() => {
            html2canvas(document.getElementById('ticket-print')).then(canvas => {
                const link = document.createElement('a');
                link.download = `Recibo_${cli}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }, 500);
    }

    function toggleEl(id) { 
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function showView(v) { 
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        toggleSidebar();
    }

    function lanzarModal(m) {
        document.getElementById('modal-body').innerText = m;
        document.getElementById('modal-footer').innerHTML = `<button class="btn btn-accent" onclick="document.getElementById('modal-overlay').style.display='none'">ACEPTAR</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    init();
</script>
</body>
</html>
