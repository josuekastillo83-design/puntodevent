<script>
const STORE_KEY = "ABONERO_PRO_DATABASE_V1";
const CONFIG_KEY = "ABONERO_PRO_CONFIG_V1";

let database = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
let config = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {
    name: "ABONERO APP",
    color: "#3483fa",
    logo: ""
};

function init() {
    document.documentElement.style.setProperty('--p-color', config.color);
    document.getElementById('header-name').innerText = config.name;
    document.getElementById('cfg-name').value = config.name;
    document.getElementById('cfg-color-p').value = config.color;

    if(config.logo){
        document.getElementById('cfg-preview').src = config.logo;
        document.getElementById('cfg-preview').style.display = 'block';
    }

    renderList();
}

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('open');
}

function changeView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    toggleMenu();
}

function showModal(msg, footer = '') {
    document.getElementById('modal-text').innerHTML = msg;
    document.getElementById('modal-actions').innerHTML =
        footer || `<button class="btn btn-main" onclick="closeModal()">OK</button>`;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function handleLogo(e) {
    if(!e.target.files[0]) return;

    const reader = new FileReader();
    reader.onload = () => {
        config.logo = reader.result;
        document.getElementById('cfg-preview').src = config.logo;
        document.getElementById('cfg-preview').style.display = 'block';
    };
    reader.readAsDataURL(e.target.files[0]);
}

function applySettings() {
    config.name = document.getElementById('cfg-name').value.toUpperCase();
    config.color = document.getElementById('cfg-color-p').value;

    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));

    showModal("✅ Cambios guardados", `
        <button class="btn btn-main" onclick="location.reload()">REINICIAR</button>
    `);
}

function saveSale() {
    const name = document.getElementById('in-name').value.trim().toUpperCase();
    const street = document.getElementById('in-street').value;
    const col = document.getElementById('in-col').value;
    const cp = document.getElementById('in-cp').value;
    const mun = document.getElementById('in-mun').value;
    const est = document.getElementById('in-est').value;
    const item = document.getElementById('in-item').value;
    const bal = parseFloat(document.getElementById('in-balance').value);

    if(!name || !item || isNaN(bal)){
        return showModal("⚠️ Completa los campos obligatorios");
    }

    if(!database[name]){
        database[name] = { name, street, col, cp, mun, est, accounts: [] };
    }

    database[name].accounts.push({
        id: Date.now(),
        item,
        balance: bal,
        history: []
    });

    localStorage.setItem(STORE_KEY, JSON.stringify(database));

    // LIMPIAR CAMPOS
    document.querySelectorAll('#view-add input').forEach(i => i.value = "");

    showModal("✅ Venta guardada correctamente");
    renderList();
    changeView('view-list');
}

function renderList() {
    const root = document.getElementById('clients-render');
    root.innerHTML = "";

    Object.values(database).forEach(cli => {
        let accountsHtml = cli.accounts.map(acc => `
            <div class="item-box">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${acc.item}</strong>
                    <b style="color:var(--p-color)">$${acc.balance}</b>
                </div>

                <button class="btn btn-main" style="padding:10px; margin-top:10px;"
                onclick="openAbono('${cli.name}', ${acc.id})">ABONAR</button>

                <table class="history-table">
                    <tbody>
                        ${acc.history.map(h => `
                        <tr>
                            <td>${h.date}</td>
                            <td>$${h.amount}</td>
                            <td>$${h.current}</td>
                        </tr>`).reverse().join('')}
                    </tbody>
                </table>
            </div>
        `).join('');

        const safeId = "c-" + cli.name.replace(/[^a-zA-Z0-9]/g,'');

        root.innerHTML += `
            <div class="client-box">
                <div class="client-top" onclick="toggleAcc('${safeId}')">
                    <div>
                        <strong>${cli.name}</strong><br>
                        <small>${cli.street}, ${cli.col}</small>
                    </div>
                    ▼
                </div>

                <div id="${safeId}" style="display:none">
                    ${accountsHtml}
                </div>
            </div>
        `;
    });
}

function openAbono(cli, id) {
    showModal(`
        Abonar a <b>${cli}</b><br><br>
        <input type="number" id="modal-amount" placeholder="Monto">
    `, `
        <button class="btn btn-main" onclick="processAbono('${cli}', ${id})">PAGAR</button>
    `);
}

function processAbono(cliName, accId) {
    const amount = parseFloat(document.getElementById('modal-amount').value);

    if(isNaN(amount) || amount <= 0){
        return alert("Monto inválido");
    }

    const acc = database[cliName].accounts.find(a => a.id === accId);

    let prev = parseFloat(acc.balance);
    let newBalance = prev - amount;

    acc.balance = parseFloat(newBalance.toFixed(2));

    const date = new Date().toLocaleString();

    acc.history.push({
        date,
        amount,
        previous: prev,
        current: acc.balance
    });

    localStorage.setItem(STORE_KEY, JSON.stringify(database));

    closeModal();
    renderList();

    generateTicket(cliName, acc.item, prev, amount, acc.balance, date);
}

function generateTicket(cli, item, ant, abo, act, date) {
    const c = database[cli];

    document.getElementById('t-brand').innerText = config.name;
    document.getElementById('t-date').innerText = date;
    document.getElementById('t-c-name').innerText = cli;
    document.getElementById('t-c-dir').innerText = `${c.street}, ${c.col}`;
    document.getElementById('t-c-item').innerText = item;
    document.getElementById('t-c-ant').innerText = "$" + ant;
    document.getElementById('t-c-abo').innerText = "$" + abo;
    document.getElementById('t-c-act').innerText = "$" + act;

    if(config.logo){
        document.getElementById('t-logo').src = config.logo;
        document.getElementById('t-logo').style.display = "block";
    }

    html2canvas(document.getElementById('ticket')).then(canvas => {
        const link = document.createElement('a');
        link.download = `ticket_${cli}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
}

function smartRoute() {
    let sorted = Object.values(database).sort((a, b) =>
        (parseInt(a.cp)||0) - (parseInt(b.cp)||0)
    );

    let newDb = {};
    sorted.forEach(c => newDb[c.name] = c);

    database = newDb;

    renderList();
    showModal("📍 Ruta optimizada");
}

function toggleAcc(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

init();
</script>
