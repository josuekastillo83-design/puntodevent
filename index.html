<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXVENT Cloud Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --accent: #00f2fe; --success: #2ed573; --danger: #ff4757;
            --bg-body: #000000; --bg-card: #121212; --text: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-body); color: var(--text); height: 100vh; overflow: hidden; }

        /* VISTA DE AUTENTICACIÓN */
        #login-view { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: var(--bg-card); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); width: 100%; max-width: 400px; text-align: center; }

        /* VISTA DE APLICACIÓN */
        #app-view { display: none; height: 100vh; flex-direction: column; }
        .top-bar { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); position: relative; z-index: 1001; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .ticket-panel { width: 35%; border-right: 1px solid #333; display: flex; flex-direction: column; background: #000; }
        .actions-panel { width: 65%; padding: 15px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); grid-auto-rows: 110px; gap: 10px; }

        /* TICKET ITEMS */
        .cart-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        .total-section { padding: 20px; background: #080808; border-top: 2px solid var(--accent); }
        .action-btn { background: var(--bg-card); border: 1px solid #333; border-radius: 12px; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; font-weight: 600; font-size: 12px; }
        .action-btn:hover { border-color: var(--accent); }
        .btn-pay { background: var(--success); color: #000; grid-column: span 2; grid-row: span 2; font-size: 24px; font-weight: bold; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #000; z-index: 2000; transition: 0.3s; padding: 20px; border-right: 2px solid var(--accent); }
        .sidebar.open { left: 0; }
        .nav-link { display: block; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .nav-link.active { background: var(--accent); color: #000; font-weight: 600; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); width: 95%; max-width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--accent); }
        .input-style { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #000; border: 1px solid #333; color: #fff; font-size: 16px; outline: none; }

        .cash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .bill-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
        @media (max-width: 800px) { .main-container { flex-direction: column; } .ticket-panel, .actions-panel { width: 100%; height: 50vh; } }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-card">
            <h1 style="color:var(--accent); margin-bottom:0;">NEXVENT</h1>
            <p id="auth-title" style="margin-top:0; color:#666;">Iniciar Sesión</p>
            
            <input type="email" id="email" class="input-style" placeholder="Correo">
            <input type="password" id="pass" class="input-style" placeholder="Contraseña">
            
            <button id="btn-auth" onclick="handleAuth()" class="btn-main" style="width:100%; background:var(--accent); color:#000; padding:15px; border-radius:10px; border:none; font-weight:600; margin-bottom:10px;">INGRESAR</button>
            
            <p style="font-size:12px; cursor:pointer; color:var(--accent);" onclick="toggleAuthMode()" id="auth-toggle-text">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <div id="app-view">
        <div class="top-bar">
            <div onclick="toggleSidebar()" style="cursor:pointer; font-weight:600; color:var(--accent);">☰ MENÚ</div>
            <div style="font-weight:300; letter-spacing:1px;">NEX<b style="color:var(--accent)">VENT</b></div>
            <div id="user-tag" style="font-size:10px; opacity:0.6;"></div>
        </div>

        <div class="sidebar" id="sidebar">
            <h2 style="color:var(--accent)">NEXVENT PRO</h2>
            <nav>
                <a href="#" class="nav-link active" onclick="showSec('pos')">🛒 CAJA</a>
                <a href="#" class="nav-link" onclick="showSec('stock')">📦 STOCK</a>
                <a href="#" class="nav-link" onclick="showSec('fiados')">👥 FIADOS</a>
                <a href="#" class="nav-link" onclick="showSec('providers')">🚚 PROVEEDORES</a>
                <a href="#" class="nav-link" onclick="showSec('gastos')">💸 GASTOS</a>
                <a href="#" class="nav-link" onclick="showSec('corte')">📊 CORTE</a>
                <a href="#" class="nav-link" onclick="firebase.auth().signOut()" style="color:var(--danger); margin-top:20px;">🔴 CERRAR SESIÓN</a>
            </nav>
        </div>
        
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div class="main-container" id="pos-section">
            <div class="ticket-panel">
                <div id="cart-list" style="flex:1; overflow-y:auto; padding:10px;"></div>
                <div class="total-section">
                    <input type="text" id="sku-in" class="input-style" placeholder="Escanear producto..." onkeypress="handleSKU(event)">
                    <h2 id="total-val" style="font-size:45px; margin:0; text-align:right; color:var(--accent);">$0.00</h2>
                </div>
            </div>
            <div class="actions-panel">
                <button class="action-btn btn-pay" onclick="openPaymentModal()">COBRAR</button>
                <button class="action-btn" onclick="toggleCam()">📷 CÁMARA</button>
                <button class="action-btn" onclick="showSec('fiados')">👥 FIADOS</button>
                <button class="action-btn" onclick="showSec('gastos')">💸 GASTOS</button>
                <button class="action-btn" onclick="showSec('stock')">📦 STOCK</button>
                <button class="action-btn" onclick="showSec('providers')">🚚 PROV</button>
                <button class="action-btn" style="background:#222;" onclick="if(confirm('¿Vaciar?')){cart=[];renderCart();}">❌ VACIAR</button>
                <div id="reader" style="display:none; grid-column:span 3; border-radius:15px; overflow:hidden;"></div>
            </div>
        </div>
    </div>

    <div id="pay-modal" class="modal">
        <div class="modal-content">
            <h1 id="m-total" style="font-size:40px; text-align:center; color:var(--accent); margin:0;">$0.00</h1>
            <select id="p-method" class="input-style" onchange="togglePayUI()">
                <option value="efectivo">EFECTIVO</option>
                <option value="tarjeta">TARJETA</option>
                <option value="fiado">FIADO</option>
            </select>
            <div id="cash-ui">
                <input type="number" id="cash-rec" class="input-style" placeholder="Recibido" style="font-size:25px; text-align:center;" oninput="calcChange()">
                <div class="cash-grid">
                    <button class="bill-btn" onclick="addCash(20)">$20</button>
                    <button class="bill-btn" onclick="addCash(50)">$50</button>
                    <button class="bill-btn" onclick="addCash(100)">$100</button>
                    <button class="bill-btn" onclick="addCash(200)">$200</button>
                    <button class="bill-btn" onclick="addCash(500)">$500</button>
                </div>
                <h2 id="change-text" style="text-align:center; color:var(--success);">Cambio: $0.00</h2>
            </div>
            <div id="debt-ui" style="display:none;"><input type="text" id="debt-cust" class="input-style" placeholder="Nombre deudor"></div>
            <button class="btn-main" onclick="confirmPayment()" style="width:100%; padding:20px; background:var(--accent); color:#000; border:none; border-radius:15px; font-weight:bold; font-size:18px;">FINALIZAR VENTA</button>
            <button class="btn-main" style="width:100%; background:none; color:#555; border:none; margin-top:10px;" onclick="document.getElementById('pay-modal').style.display='none'">CANCELAR</button>
        </div>
    </div>

<script>
    // --- CONFIGURACIÓN FIREBASE (COLOCA TUS DATOS AQUÍ) ---
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        databaseURL: "https://TU_PROYECTO.firebaseio.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);

    let db = { inv:[], fiados:[], gastos:[], providers:[], vEfe:0, vTar:0, ganancia:0, abHoy:0, cfg:{name:'NEXVENT'} };
    let cart = [], currentUser, scanner, isRegisterMode = false;

    // --- AUTENTICACIÓN Y REGISTRO ---
    firebase.auth().onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'flex';
            document.getElementById('user-tag').innerText = user.email;
            syncData();
        } else {
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('app-view').style.display = 'none';
        }
    });

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "Crear Cuenta Nueva" : "Iniciar Sesión";
        document.getElementById('btn-auth').innerText = isRegisterMode ? "REGISTRARME" : "INGRESAR";
        document.getElementById('auth-toggle-text').innerText = isRegisterMode ? "¿Ya tienes cuenta? Entra aquí" : "¿No tienes cuenta? Regístrate aquí";
    }

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        if(!e || !p) return alert("Llena todos los campos");
        try {
            if (isRegisterMode) {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(e, p);
                await firebase.database().ref('usuarios/' + userCredential.user.uid).set(db);
                alert("Cuenta creada.");
            } else { await firebase.auth().signInWithEmailAndPassword(e, p); }
        } catch(err) { alert(err.message); }
    }

    function syncData() {
        firebase.database().ref('usuarios/' + currentUser.uid).on('value', snap => {
            if(snap.val()) { db = snap.val(); renderCart(); }
        });
    }

    function cloudSave() { if(currentUser) firebase.database().ref('usuarios/' + currentUser.uid).set(db); }

    // --- LÓGICA DE CAJA ---
    function handleSKU(e) { if(e.key==='Enter'){ const p = db.inv.find(x=>x.sku===e.target.value); if(p) addToCart(p); e.target.value=''; } }
    function addToCart(p) {
        if(p.stock <= 0) return alert("PRODUCTO AGOTADO");
        const i = cart.find(x=>x.sku===p.sku);
        if(i) { if(i.q < p.stock) i.q++; else return alert("Límite stock"); } else cart.push({...p, q:1});
        renderCart();
    }
    function renderCart() {
        let t = 0;
        document.getElementById('cart-list').innerHTML = cart.map(i => {
            t += (i.sell * i.q);
            return `<div class="cart-item"><span><b>${i.q}x</b> ${i.name}</span><span>$${(i.sell*i.q).toFixed(2)}</span></div>`;
        }).join('');
        document.getElementById('total-val').innerText = `$${t.toFixed(2)}`;
    }

    function addCash(n) { const inp = document.getElementById('cash-rec'); inp.value = (parseFloat(inp.value)||0) + n; calcChange(); }
    function calcChange() {
        const t = parseFloat(document.getElementById('total-val').innerText.replace('$','')), r = parseFloat(document.getElementById('cash-rec').value)||0;
        document.getElementById('change-text').innerText = "Cambio: $" + (r-t).toFixed(2);
    }

    function confirmPayment() {
        const t = parseFloat(document.getElementById('total-val').innerText.replace('$','')), m = document.getElementById('p-method').value;
        cart.forEach(i => { const p = db.inv.find(x=>x.sku===i.sku); if(p){ p.stock-=i.q; db.ganancia+=(i.sell-i.buy)*i.q; } });
        if(m==='efectivo') db.vEfe += t; else if(m==='tarjeta') db.vTar += t;
        else {
            const nombreD = document.getElementById('debt-cust').value || "Cliente";
            const ex = db.fiados.find(f => f.n.toLowerCase() === nombreD.toLowerCase());
            if(ex){ ex.m += t; } else { db.fiados.unshift({n: nombreD, m: t, detalles: cart.map(i=>i.name).join(', ')}); }
        }
        cloudSave(); cart=[]; renderCart(); document.getElementById('pay-modal').style.display='none';
    }

    // --- UI Y MENÚ ---
    function openPaymentModal() { if(cart.length){ document.getElementById('pay-modal').style.display='flex'; document.getElementById('m-total').innerText=document.getElementById('total-val').innerText; } }
    function togglePayUI() { document.getElementById('cash-ui').style.display = document.getElementById('p-method').value==='efectivo'?'block':'none'; document.getElementById('debt-ui').style.display = document.getElementById('p-method').value==='fiado'?'block':'none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function showSec(id) { alert("Accediendo a " + id + ". Las funciones se sincronizan en la nube."); toggleSidebar(); }
</script>
</body>
</html>
