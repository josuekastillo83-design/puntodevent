<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Punto de Venta Free PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; padding: 10px; padding-bottom: 120px; }
        h1 { color: #00c800; text-align: center; font-size: 18px; margin: 10px 0; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; min-height: 250px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: #00c800; color: #000; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-red { background: #ff4444; color: #fff; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #222; border-radius: 8px; font-size: 11px; color: #999; min-width: 80px; }
        .tab.active { background: #00c800; color: #000; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        td, th { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        .total-txt { text-align: right; color: #00c800; font-size: 30px; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: #000; border-top: 1px solid #333; }
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <h1>PUNTO DE VENTA FREE</h1>

    <div class="tab-nav">
        <div class="tab active" id="t-venta" onclick="ver('venta')">VENTA</div>
        <div class="tab" id="t-inv" onclick="ver('inv')">STOCK</div>
        <div class="tab" id="t-fiado" onclick="ver('fiado')">FIADO</div>
        <div class="tab" id="t-hist" onclick="ver('hist')">CORTE</div>
    </div>

    <div id="sec-venta">
        <div class="card"><div id="reader"></div></div>
        <div class="card">
            <div id="carrito-lista"></div>
            <div class="total-txt" id="total-txt">$ 0.00</div>
        </div>
    </div>

    <div id="sec-inv" style="display:none;">
        <div class="card">
            <p>Ajustar todos los precios:</p>
            <div style="display:flex; gap:5px;">
                <button class="btn btn-blue" onclick="ajustar(1.05)">+5%</button>
                <button class="btn btn-red" onclick="ajustar(0.95)">-5%</button>
            </div>
        </div>
        <div class="card">
            <input type="text" id="in-code" placeholder="Código">
            <input type="text" id="in-nom" placeholder="Nombre">
            <input type="number" id="in-pre" placeholder="Precio">
            <input type="number" id="in-stock" placeholder="Stock">
            <button class="btn btn-green" onclick="guardar()">GUARDAR</button>
        </div>
        <div class="card"><table id="t-inv"><thead><tr><th>Prod</th><th>Stock</th><th>Precio</th></tr></thead><tbody id="l-inv"></tbody></table></div>
    </div>

    <div id="sec-fiado" style="display:none;">
        <div class="card">
            <input type="text" id="f-nom" placeholder="Nombre Cliente">
            <input type="number" id="f-mon" placeholder="Monto $">
            <button class="btn btn-blue" onclick="gFiado()">FIAR</button>
        </div>
        <div class="card"><table><thead><tr><th>Cliente</th><th>Deuda</th><th></th></tr></thead><tbody id="l-fiado"></tbody></table></div>
    </div>

    <div id="sec-hist" style="display:none;">
        <div class="card">
            <h2 id="total-dia" style="color:#00c800; text-align:center;">$0.00</h2>
            <button class="btn btn-blue" onclick="exp()">EXCEL (CSV)</button>
            <button class="btn btn-red" onclick="limp()">LIMPIAR DÍA</button>
        </div>
    </div>

    <div id="modal">
        <div class="card" style="width:90%;">
            <h2 id="m-tot" style="text-align:center; color:#00c800;"></h2>
            <input type="number" id="m-paga" placeholder="Paga con..." style="font-size:20px; text-align:center;">
            <h2 id="m-cam" style="text-align:center; color:#ff4444; margin:10px 0;"></h2>
            <button class="btn btn-green" onclick="conf()">FINALIZAR</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="cerrar()">CERRAR</button>
        </div>
    </div>

    <div class="footer"><button class="btn btn-green" onclick="abrir()">COBRAR</button></div>

<script>
    let db = JSON.parse(localStorage.getItem('pos_v6_db')) || {};
    let vent = JSON.parse(localStorage.getItem('pos_v6_v')) || [];
    let fia = JSON.parse(localStorage.getItem('pos_v6_f')) || {};
    let carr = []; let tot = 0; let sc;

    function ver(s) {
        ["sec-venta","sec-inv","sec-fiado","sec-hist"].forEach(x=>document.getElementById(x).style.display='none');
        ["t-venta","t-inv","t-fiado","t-hist"].forEach(x=>document.getElementById(x).className='tab');
        document.getElementById('sec-'+s).style.display='block';
        document.getElementById('t-'+s).className='tab active';
        if(s=='inv') rInv(); if(s=='fiado') rFia(); if(s=='hist') rHist();
    }

    function init() {
        sc = new Html5Qrcode("reader");
        sc.start({facingMode:"environment"},{fps:10,qrbox:250}, (t)=>{
            if(db[t]){
                if(db[t].stock > 0){ carr.push({...db[t], code:t}); rCarr(); }
                else alert("Sin stock");
            } else { document.getElementById('in-code').value = t; }
        }).catch(e=>console.log(e));
    }

    function guardar(){
        let c=document.getElementById('in-code').value, n=document.getElementById('in-nom').value, p=parseFloat(document.getElementById('in-pre').value), s=parseInt(document.getElementById('in-stock').value);
        if(!c||!n) return; db[c]={nombre:n, precio:p, stock:s};
        localStorage.setItem('pos_v6_db', JSON.stringify(db)); rInv(); alert("Ok");
    }

    function ajustar(f){
        if(confirm("¿Ajustar precios?")){
            for(let k in db) db[k].precio = parseFloat((db[k].precio*f).toFixed(2));
            localStorage.setItem('pos_v6_db', JSON.stringify(db)); rInv();
        }
    }

    function rInv(){
        let h=''; for(let k in db) h+=`<tr><td>${db[k].nombre}</td><td>${db[k].stock}</td><td>$${db[k].precio}</td></tr>`;
        document.getElementById('l-inv').innerHTML = h;
    }

    function rCarr(){
        let l=document.getElementById('carrito-lista'); tot=0; l.innerHTML='';
        carr.forEach(i=>{ tot+=i.precio; l.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${i.nombre}</span><b>$${i.precio}</b></div>`;});
        document.getElementById('total-txt').innerText = '$ '+tot.toFixed(2);
    }

    function abrir(){ if(carr.length==0) return; document.getElementById('modal').style.display='flex'; document.getElementById('m-tot').innerText="Total: $"+tot.toFixed(2); }

    document.getElementById('m-paga').oninput = (e) => {
        let c = (parseFloat(e.target.value)||0) - tot;
        document.getElementById('m-cam').innerText = "Cambio: $"+(c>0?c.toFixed(2):"0.00");
    };

    function conf(){
        carr.forEach(i=>{ db[i.code].stock--; });
        vent.push({t:tot, f:new Date().toLocaleString()});
        localStorage.setItem('pos_v6_db', JSON.stringify(db));
        localStorage.setItem('pos_v6_v', JSON.stringify(vent));
        carr=[]; rCarr(); cerrar(); alert("Vendido");
    }

    function gFiado(){
        let n=document.getElementById('f-nom').value, m=parseFloat(document.getElementById('f-mon').value);
        if(!n||isNaN(m)) return; fia[n]=(fia[n]||0)+m;
        localStorage.setItem('pos_v6_f', JSON.stringify(fia)); rFia();
    }

    function rFia(){
        let h=''; for(let n in fia) h+=`<tr><td>${n}</td><td>$${fia[n]}</td><td><button onclick="pagaF('${n}')">PAGAR</button></td></tr>`;
        document.getElementById('l-fiado').innerHTML = h;
    }

    function pagaF(n){ delete fia[n]; localStorage.setItem('pos_v6_f', JSON.stringify(fia)); rFia(); }

    function exp(){
        let c="Fecha,Total\n"; vent.forEach(v=>c+=`${v.f},${v.t}\n`);
        let b=new Blob([c],{type:'text/csv'}); let a=document.createElement('a');
        a.href=URL.createObjectURL(b); a.download=`Ventas_${new Date().toLocaleDateString()}.csv`; a.click();
    }

    function rHist(){
        let t=0; vent.forEach(v=>t+=v.t);
        document.getElementById('total-dia').innerText = "Vendido hoy: $"+t.toFixed(2);
    }

    function limp(){ if(confirm("¿Limpiar día?")){ vent=[]; localStorage.setItem('pos_v6_v', JSON.stringify(vent)); rHist(); } }
    function cerrar(){ document.getElementById('modal').style.display='none'; }
    window.onload = init;
</script>
</body>
</html>
