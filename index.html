<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite POS - Tipografía y Diseño Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Grand+Hotel&family=Lora:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style id="dynamic-styles">
        :root {
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --sidebar-bg: #111;
            --font-main: 'Poppins', sans-serif;
            --accent-color: #00f2fe;
        }

        body { 
            font-family: var(--font-main); 
            background: #f4f6f9; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }
        
        /* Sidebar Estilo Tornasol */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 5px 0 20px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .sidebar h2 { 
            text-align: center; 
            padding: 35px 15px; 
            margin: 0; 
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2em;
            font-weight: 800;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .nav-btn { 
            padding: 22px 25px; 
            border: none; 
            background: transparent; 
            color: #777; 
            text-align: left; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 5px solid transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* RESALTE DE SECCIÓN ACTIVA */
        .nav-btn.active { 
            background: rgba(255, 255, 255, 0.08);
            color: #fff; 
            border-left: 7px solid var(--accent-color);
            box-shadow: inset 15px 0 25px rgba(0,0,0,0.3);
            transform: translateX(8px);
        }

        /* Contenido Principal */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .section { display: none; animation: slideUp 0.5s ease; }
        .section.active { display: block; }

        @keyframes slideUp { 
            from { transform: translateY(30px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.06); 
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Venta Visual */
        #sku-input { 
            width: 100%; 
            padding: 25px; 
            font-size: 1.6rem; 
            border-radius: 20px; 
            border: 2px solid #e0e0e0;
            outline: none;
            transition: 0.4s;
            background: #fafafa;
        }
        #sku-input:focus { border-color: var(--accent-color); background: white; box-shadow: 0 0 20px rgba(0,242,254,0.15); }

        .btn-elite {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-elite:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.25); }

        .total-card { 
            background: var(--gradient); 
            color: white; 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center;
            box-shadow: 0 20px 45px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .total-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: rgba(255,255,255,0.1); transform: rotate(45deg); pointer-events: none;
        }
        .total-card h2 { font-size: 4.5em; margin: 15px 0; letter-spacing: -2px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { padding: 15px; color: #999; text-transform: uppercase; font-size: 12px; }
        td { padding: 22px; background: #fff; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
        td:first-child { border-radius: 18px 0 0 18px; border-left: 1px solid #f0f0f0; }
        td:last-child { border-radius: 0 18px 18px 0; border-right: 1px solid #f0f0f0; }

        /* Selector de Temas */
        .swatch { 
            width: 60px; height: 60px; border-radius: 15px; cursor: pointer; 
            border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .swatch:hover { transform: scale(1.1) rotate(5deg); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="display-name">ELITE POS</h2>
    <button class="nav-btn active" onclick="showSection('pos', this)">🛒 CAJA REGISTRADORA</button>
    <button class="nav-btn" onclick="showSection('inventory', this)">📦 STOCK / PRODUCTOS</button>
    <button class="nav-btn" onclick="showSection('settings', this)">⚙️ PERSONALIZAR</button>
</div>

<div class="main-content">
    
    <div id="pos" class="section active">
        <div style="display: grid; grid-template-columns: 1.7fr 1.1fr; gap: 40px;">
            <div class="card">
                <input type="text" id="sku-input" placeholder="Escanear Producto..." onkeypress="handleScan(event)" autofocus>
                <table>
                    <thead>
                        <tr><th>Producto</th><th>Precio</th><th>Cant.</th><th>Subtotal</th><th></th></tr>
                    </thead>
                    <tbody id="cart-items"></tbody>
                </table>
            </div>
            <div class="side">
                <div class="total-card">
                    <p style="font-weight: 600; opacity: 0.9;">TOTAL A PAGAR</p>
                    <h2>$<span id="total-val">0.00</span></h2>
                </div>
                <button class="btn-elite" style="width: 100%; margin-top: 25px; padding: 30px; font-size: 1.6em;" onclick="processSale()">COBRAR (F12)</button>
            </div>
        </div>
    </div>

    <div id="inventory" class="section">
        <div class="card">
            <h3>Gestión de Productos</h3>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                <input type="text" id="inv-sku" placeholder="SKU/Código">
                <input type="text" id="inv-name" placeholder="Nombre">
                <input type="number" id="inv-price" placeholder="Precio">
                <input type="number" id="inv-stock" placeholder="Stock Inicial">
            </div><br>
            <button class="btn-elite" onclick="saveProduct()">Guardar en Sistema</button>
        </div>
        <div class="card">
            <table id="inv-table">
                <thead><tr><th>SKU</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr></thead>
                <tbody id="inv-list"></tbody>
            </table>
        </div>
    </div>

    <div id="settings" class="section">
        <div class="card">
            <h3>Panel de Estilo de Marca</h3>
            
            <p><strong>1. Nombre del Negocio</strong></p>
            <input type="text" id="set-name" style="padding:15px; width: 400px; border-radius:10px; border:1px solid #ccc;">
            
            <p><strong>2. Selección de Tipografía Exclusiva</strong></p>
            <select id="set-font" style="padding:15px; width: 425px; border-radius:10px; font-size:16px;" onchange="applyVisuals()">
                <option value="'Grand Hotel', cursive">Grand Hotel (Elegante/Script)</option>
                <option value="'Berkshire Swash', cursive">Berkshire Swash (Vintage/Artística)</option>
                <option value="'Lora', serif">Lora (Serif Profesional)</option>
                <option value="'Poppins', sans-serif">Poppins (Moderna/Limpia)</option>
                <option value="'Courier New', monospace">Clásica (Máquina de escribir)</option>
            </select>

            <p><strong>3. Temas Tornasol (Gradientes)</strong></p>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px;">
                <div class="swatch" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="setTheme('linear-gradient(135deg, #667eea 0%, #764ba2 100%)', '#00f2fe')"></div>
                <div class="swatch" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="setTheme('linear-gradient(135deg, #f093fb 0%, #f5576c 100%)', '#f093fb')"></div>
                <div class="swatch" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" onclick="setTheme('linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)', '#43e97b')"></div>
                <div class="swatch" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" onclick="setTheme('linear-gradient(135deg, #fa709a 0%, #fee140 100%)', '#fa709a')"></div>
                <div class="swatch" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);" onclick="setTheme('linear-gradient(135deg, #30cfd0 0%, #330867 100%)', '#30cfd0')"></div>
                <div class="swatch" style="background: linear-gradient(135deg, #09203f 0%, #537895 100%);" onclick="setTheme('linear-gradient(135deg, #09203f 0%, #537895 100%)', '#09203f')"></div>
            </div>

            <br><br>
            <button class="btn-elite" onclick="saveSettings()">Aplicar y Guardar Cambios</button>
        </div>
    </div>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('e_inv')) || [];
    let cart = [];
    let config = JSON.parse(localStorage.getItem('e_cfg')) || {
        name: 'ELITE POS',
        font: "'Poppins', sans-serif",
        theme: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        accent: '#00f2fe'
    };

    function init() {
        document.getElementById('display-name').innerText = config.name;
        document.getElementById('set-name').value = config.name;
        document.getElementById('set-font').value = config.font;
        applyVisuals();
    }

    function applyVisuals() {
        const root = document.documentElement;
        root.style.setProperty('--gradient', config.theme);
        root.style.setProperty('--font-main', config.font);
        root.style.setProperty('--accent-color', config.accent);
        document.body.style.fontFamily = config.font;
        // Forzar actualización de fuentes en inputs y botones
        document.querySelectorAll('input, button, select').forEach(el => el.style.fontFamily = config.font);
    }

    function setTheme(grad, accent) {
        config.theme = grad;
        config.accent = accent;
        applyVisuals();
    }

    function saveSettings() {
        config.name = document.getElementById('set-name').value;
        config.font = document.getElementById('set-font').value;
        localStorage.setItem('e_cfg', JSON.stringify(config));
        document.getElementById('display-name').innerText = config.name;
        alert("Personalización actualizada correctamente");
    }

    // --- NAVEGACIÓN ---
    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'inventory') renderInv();
        if(id === 'pos') setTimeout(() => document.getElementById('sku-input').focus(), 100);
    }

    // --- CAJA ---
    function handleScan(e) {
        if(e.key === 'Enter') {
            const sku = e.target.value.trim();
            if(!sku) return;
            const p = inventory.find(x => x.sku === sku);
            if(p) {
                addToCart(p);
            } else {
                const n = prompt("NUEVO PRODUCTO\nNombre:");
                if(n) {
                    const pr = parseFloat(prompt("Precio de Venta:"));
                    if(!isNaN(pr)) {
                        const np = { sku, name: n, price: pr, stock: 99 };
                        inventory.push(np);
                        saveInv();
                        addToCart(np);
                    }
                }
            }
            e.target.value = '';
        }
    }

    function addToCart(p) {
        const item = cart.find(x => x.sku === p.sku);
        if(item) item.qty++;
        else cart.push({...p, qty: 1});
        renderCart();
    }

    function renderCart() {
        const b = document.getElementById('cart-items');
        let t = 0;
        b.innerHTML = cart.map((i, idx) => {
            t += i.price * i.qty;
            return `<tr><td>${i.name}</td><td>$${i.price.toFixed(2)}</td><td>${i.qty}</td><td>$${(i.price*i.qty).toFixed(2)}</td><td><button class="btn-elite" style="padding:5px 12px; background: #ff4757;" onclick="cart.splice(${idx},1);renderCart()">X</button></td></tr>`;
        }).join('');
        document.getElementById('total-val').innerText = t.toFixed(2);
    }

    function processSale() {
        if(cart.length === 0) return;
        cart.forEach(c => {
            const p = inventory.find(x => x.sku === c.sku);
            if(p) p.stock -= c.qty;
        });
        saveInv();
        alert("Venta procesada con éxito");
        cart = [];
        renderCart();
    }

    // --- INVENTARIO ---
    function saveProduct() {
        const sku = document.getElementById('inv-sku').value;
        const name = document.getElementById('inv-name').value;
        const price = parseFloat(document.getElementById('inv-price').value);
        const stock = parseInt(document.getElementById('inv-stock').value);
        if(!sku || !name) return;
        inventory.push({sku, name, price, stock});
        saveInv();
        renderInv();
        document.querySelectorAll('#inventory input').forEach(i => i.value = '');
    }

    function renderInv() {
        document.getElementById('inv-list').innerHTML = inventory.map(p => `<tr><td>${p.sku}</td><td>${p.name}</td><td>$${p.price.toFixed(2)}</td><td><b>${p.stock}</b></td><td><button class="btn-elite" style="background:#ff4757; padding:5px 10px;" onclick="inventory=inventory.filter(x=>x.sku!='${p.sku}');saveInv();renderInv()">Borrar</button></td></tr>`).join('');
    }

    function saveInv() { localStorage.setItem('e_inv', JSON.stringify(inventory)); }

    window.addEventListener('keydown', (e) => { if(e.key === 'F12') processSale(); });
    init();
</script>

</body>
</html>
