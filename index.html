<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nexvent - inteligencia en tu punto de venta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --accent: #00f2fe;
            --success: #2ed573;
            --danger: #ff4757;
            --bg-body: #000000;
            --bg-card: #111111;
            --text-main: #ffffff;
            --border-color: #333;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }

        .top-bar {
            background: #000; color: white; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000;
        }
        .top-bar-brand { display: flex; align-items: center; gap: 12px; }
        #bar-logo-img { height: 40px; width: 40px; border-radius: 10px; object-fit: cover; border: 1px solid var(--accent); }
        .bar-name { font-weight: 300; font-size: 1.5em; letter-spacing: -1px; }
        .bar-name span { color: var(--accent); font-weight: 600; }

        .navbar { background: #111; display: flex; overflow-x: auto; border-bottom: 1px solid #222; position: sticky; top: 72px; z-index: 999; }
        .nav-btn { padding: 15px 20px; border: none; background: transparent; color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
        .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }

        .main-content { flex-grow: 1; padding: 15px; padding-bottom: 100px; }
        .section { display: none; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--bg-card); border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px; border: 1px solid var(--border-color); }
        .input-style { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border-color); font-size: 16px; outline: none; background: #222; color: white; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; background: var(--accent); color: #000; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        
        .total-box { background: #000; color: white; padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        .total-box h2 { font-size: 3.5em; margin: 0; color: var(--accent); }

        /* TICKET VISUAL */
        #ticket-view { 
            display: none; background: #fff; color: #000; padding: 25px; 
            font-family: 'Courier New', monospace; border-radius: 5px; margin-top: 15px;
        }
        .ticket-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }

        .qty-ctrl { display: flex; align-items: center; gap: 15px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 10px; border: 1px solid var(--border-color); background: #333; color: white; font-weight: bold; }

        #reader-pos, #reader-stock { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid var(--accent); }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #111; width: 90%; max-width: 400px; padding: 30px; border-radius: 30px; text-align: center; border: 1px solid var(--accent); }
    </style>
</head>
<body onload="initApp()">

    <div class="top-bar">
        <div class="top-bar-brand">
            <img id="bar-logo-img" style="display:none;">
            <div class="bar-name" id="bar-display">nex<span>vent</span></div>
        </div>
        <small id="top-slogan" style="font-size: 10px; color: #666;"></small>
    </div>

    <div class="navbar">
        <button class="nav-btn active" onclick="showSec('pos', this)">🛒 vender</button>
        <button class="nav-btn" onclick="showSec('stock', this)">📦 stock</button>
        <button class="nav-btn" onclick="showSec('fiados', this)">👥 fiados</button>
        <button class="nav-btn" onclick="showSec('corte', this)">💰 corte</button>
        <button class="nav-btn" onclick="showSec('vip', this)">💎 vip</button>
    </div>

    <div class="main-content">
        <div id="pos" class="section active">
            <input type="text" id="sku-in" class="input-style" placeholder="Escanear o SKU..." onkeypress="handleSKU(event)">
            <button onclick="toggleCam('reader-pos', 'sale')" class="btn-main" style="background:#222; color:white;">📷 cámara</button>
            <div id="reader-pos"></div>
            
            <div class="card" id="cart-container">
                <table style="width:100%;">
                    <tbody id="cart-body"></tbody>
                </table>
            </div>

            <div class="total-box"><small>TOTAL</small><h2 id="total-val">$0.00</h2></div>
            <button class="btn-main" id="btn-cobrar" onclick="openPaymentModal()">finalizar cobro</button>

            <div id="ticket-view">
                <div class="ticket-header"><h2 id="t-store">NEXVENT</h2><p id="t-date"></p></div>
                <div id="t-items"></div>
                <div class="ticket-row" style="border-top:1px solid #000; padding-top:10px;"><b>TOTAL:</b> <b id="t-total"></b></div>
            </div>
            
            <button id="btn-wa" class="btn-main" style="display:none; background:#25D366; color:white;" onclick="sendWhatsApp()">📲 enviar whatsapp</button>
            <button id="btn-next" class="btn-main" style="display:none; background:#444; color:white;" onclick="resetPos()">nueva venta</button>
        </div>

        <div id="stock" class="section">
            <div class="card" style="background:#000; border-color:var(--accent);">
                <small>INVERSIÓN REAL EN STOCK</small><br><b id="inv-val" style="color:var(--accent); font-size:1.5em;">$0.00</b>
            </div>
            <div class="card">
                <input type="text" id="s-sku" class="input-style" placeholder="SKU">
                <input type="text" id="s-nom" class="input-style" placeholder="Nombre">
                <input type="number" id="s-buy" class="input-style" placeholder="Costo Compra $">
                <input type="number" id="s-sell" class="input-style" placeholder="Venta $">
                <input type="number" id="s-sto" class="input-style" placeholder="Cantidad">
                <button class="btn-main" onclick="addInv()">guardar en stock</button>
            </div>
            <div id="inv-list-container"></div>
        </div>

        <div id="fiados" class="section">
            <div class="card">
                <h3>Historial de Fiados</h3>
                <div id="fiados-list"></div>
            </div>
        </div>

        <div id="corte" class="section">
            <div class="card" style="text-align:center;">
                <small>GANANCIA NETA HOY</small>
                <h1 id="c-profit" style="color:var(--success); font-size:3em;">$0.00</h1>
                <p>Efectivo en Caja: <b id="c-balance">$0.00</b></p>
                <button class="btn-main" onclick="generateCortePDF()">📥 descargar corte pdf</button>
                <button class="btn-main" style="background:#444;" onclick="resetCorte()">cerrar caja</button>
            </div>
        </div>

        <div id="vip" class="section"><div class="card"><input type="text" id="set-name" class="input-style" placeholder="Nombre Negocio" oninput="updateVIP('name', this.value)"></div></div>
    </div>

    <div id="payment-modal" class="modal"><div class="modal-content">
        <h2 id="m-total">Total: $0.00</h2>
        <select id="p-method" class="input-style" onchange="togglePayUI()">
            <option value="efectivo">Efectivo</option>
            <option value="fiado">Fiado (A deudor)</option>
        </select>
        <div id="cash-ui"><input type="number" id="cash-rec" class="input-style" placeholder="¿Cuánto recibes?" oninput="calcChange()"><h2 id="change-text">$0.00 cambio</h2></div>
        <div id="debt-ui" style="display:none;"><input type="text" id="debt-cust" class="input-style" placeholder="Nombre del cliente"></div>
        <button class="btn-main" onclick="confirmPayment()">confirmar</button>
    </div></div>

<script>
    let db, scanner, cart = [], lastScanTime = 0;

    function initApp() {
        db = {
            inv: JSON.parse(localStorage.getItem('n_inv')) || [],
            fiados: JSON.parse(localStorage.getItem('n_fia')) || [],
            vEfe: parseFloat(localStorage.getItem('n_v_e')) || 0,
            ganancia: parseFloat(localStorage.getItem('n_gan')) || 0,
            cfg: JSON.parse(localStorage.getItem('n_cfg')) || { name: 'NEXVENTA', logo: '', scanWait: 2 }
        };
        applyVIP(); renderInv(); renderFiados();
    }

    function save() {
        localStorage.setItem('n_inv', JSON.stringify(db.inv));
        localStorage.setItem('n_fia', JSON.stringify(db.fiados));
        localStorage.setItem('n_v_e', db.vEfe);
        localStorage.setItem('n_gan', db.ganancia);
        localStorage.setItem('n_cfg', JSON.stringify(db.cfg));
    }

    function process(code, mode = 'sale') {
        const now = Date.now();
        if (now - lastScanTime < (db.cfg.scanWait * 1000)) return;
        lastScanTime = now;
        const p = db.inv.find(x => x.sku === code);
        if(p) {
            if(mode === 'sale') {
                const i = cart.find(x => x.sku === code);
                if(i) i.q++; else cart.push({...p, q: 1});
                renderCart();
            }
        }
    }

    function renderCart() {
        let t = 0;
        document.getElementById('cart-body').innerHTML = cart.map((i, idx) => {
            t += (i.sell * i.q);
            return `<tr class="card" style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <td>${i.name}</td>
                <td class="qty-ctrl"><button class="btn-qty" onclick="updateQty(${idx},-1)">-</button>${i.q}<button class="btn-qty" onclick="updateQty(${idx},1)">+</button></td>
                <td>$${(i.sell*i.q).toFixed(2)}</td>
            </tr>`;
        }).join('');
        document.getElementById('total-val').innerText = `$${t.toFixed(2)}`;
    }

    function updateQty(idx, d) { cart[idx].q += d; if(cart[idx].q <= 0) cart.splice(idx,1); renderCart(); }

    function confirmPayment() {
        const total = parseFloat(document.getElementById('total-val').innerText.replace('$',''));
        const method = document.getElementById('p-method').value;
        let gain = 0;
        let itemsHtml = "";
        
        cart.forEach(i => {
            gain += (i.sell - (i.buy || 0)) * i.q;
            itemsHtml += `<div class="ticket-row"><span>${i.q}x ${i.name}</span><span>$${(i.sell*i.q).toFixed(2)}</span></div>`;
            const p = db.inv.find(x => x.sku === i.sku); if(p) p.stock -= i.q;
        });

        if(method === 'efectivo') { db.vEfe += total; } 
        else {
            const cust = document.getElementById('debt-cust').value || "Cliente General";
            db.fiados.push({cliente: cust, total: total, fecha: new Date().toLocaleString(), productos: cart.map(c=>c.name).join(', ')});
        }

        db.ganancia += gain; save();

        // TICKET IMAGEN
        document.getElementById('t-date').innerText = new Date().toLocaleString();
        document.getElementById('t-items').innerHTML = itemsHtml;
        document.getElementById('t-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('t-store').innerText = db.cfg.name.toUpperCase();
        
        document.getElementById('ticket-view').style.display = 'block';
        document.getElementById('btn-wa').style.display = 'block';
        document.getElementById('btn-next').style.display = 'block';
        document.getElementById('cart-container').style.display = 'none';
        document.getElementById('btn-cobrar').style.display = 'none';
        closeModal();
    }

    function generateCortePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.text(db.cfg.name, 10, 20);
        doc.setFontSize(12); doc.text("REPORTE DE CORTE DIARIO", 10, 30);
        doc.text("------------------------------------------", 10, 35);
        doc.text(`Efectivo en Caja: $${db.vEfe.toFixed(2)}`, 10, 45);
        doc.text(`Ganancia Real (Utilidad): $${db.ganancia.toFixed(2)}`, 10, 55);
        doc.text(`Fecha: ${new Date().toLocaleString()}`, 10, 65);
        doc.save(`corte_${new Date().toLocaleDateString()}.pdf`);
    }

    function renderFiados() {
        document.getElementById('fiados-list').innerHTML = db.fiados.map((f, idx) => `
            <div class="card" style="border-left: 4px solid var(--danger);">
                <b>${f.cliente}</b> - $${f.total.toFixed(2)}<br>
                <small>${f.fecha} | ${f.productos}</small><br>
                <button onclick="db.fiados.splice(${idx},1);save();renderFiados()" style="background:var(--success); color:#000; border:none; border-radius:5px; margin-top:5px; padding:5px 10px;">Pagar / Eliminar</button>
            </div>
        `).join('');
    }

    function addInv() {
        const sku = document.getElementById('s-sku').value;
        const buy = parseFloat(document.getElementById('s-buy').value) || 0;
        const sell = parseFloat(document.getElementById('s-sell').value) || 0;
        const sto = parseInt(document.getElementById('s-sto').value) || 0;
        const nom = document.getElementById('s-nom').value;
        db.inv.push({sku, name: nom, buy, sell, stock: sto});
        save(); renderInv(); alert("Agregado");
    }

    function renderInv() {
        let invTotal = 0;
        document.getElementById('inv-list-container').innerHTML = db.inv.map(p => {
            invTotal += (p.buy * p.stock);
            return `<div class="card"><b>${p.name}</b><br><small>SKU: ${p.sku} | Stock: ${p.stock}</small></div>`;
        }).join('');
        document.getElementById('inv-val').innerText = `$${invTotal.toFixed(2)}`;
    }

    function sendWhatsApp() {
        const total = document.getElementById('t-total').innerText;
        let msg = `*${db.cfg.name}*\n_Recibo_\n`;
        cart.forEach(i => { msg += `• ${i.q}x ${i.name} - $${(i.sell*i.q).toFixed(2)}\n`; });
        msg += `\n*TOTAL: ${total}*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function applyVIP() { document.getElementById('bar-display').innerHTML = db.cfg.name.toLowerCase().replace('venta', '<span>venta</span>'); }
    function updateVIP(t, v) { db.cfg[t] = v; applyVIP(); save(); }
    function showSec(id, b) { 
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='corte'){ document.getElementById('c-balance').innerText=`$${db.vEfe.toFixed(2)}`; document.getElementById('c-profit').innerText=`$${db.ganancia.toFixed(2)}`; }
        if(id==='fiados') renderFiados();
    }
    function toggleCam(id, m) { const r=document.getElementById(id); if(r.style.display==='block'){ if(scanner) scanner.stop(); r.style.display='none'; } else { r.style.display='block'; scanner=new Html5Qrcode(id); scanner.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>process(t, m)); } }
    function handleSKU(e) { if(e.key === 'Enter') { process(e.target.value); e.target.value = ''; } }
    function openPaymentModal() { if(cart.length) document.getElementById('payment-modal').style.display='flex'; document.getElementById('m-total').innerText="Total: "+document.getElementById('total-val').innerText; }
    function closeModal() { document.getElementById('payment-modal').style.display='none'; }
    function togglePayUI() { const m=document.getElementById('p-method').value; document.getElementById('cash-ui').style.display=m==='efectivo'?'block':'none'; document.getElementById('debt-ui').style.display=m==='fiado'?'block':'none'; }
    function calcChange() { const t=parseFloat(document.getElementById('total-val').innerText.replace('$','')); const r=parseFloat(document.getElementById('cash-rec').value)||0; document.getElementById('change-text').innerText=`$${(r-t).toFixed(2)} cambio`; }
    function resetPos() { cart = []; renderCart(); document.getElementById('ticket-view').style.display='none'; document.getElementById('btn-wa').style.display='none'; document.getElementById('btn-next').style.display='none'; document.getElementById('cart-container').style.display='block'; document.getElementById('btn-cobrar').style.display='block'; }
    function resetCorte() { if(confirm("¿Cerrar caja?")){ db.vEfe=0; db.ganancia=0; save(); showSec('corte', document.querySelector('[onclick*="corte"]')); } }
</script>
</body>
</html>
