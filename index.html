<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AboneroApp - Nexpen Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --accent: #1a73e8; 
            --header: #fff159; 
            --bg: #f8f9fa; 
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        /* Interfaz Original Nexpen */
        header { background: var(--header); padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top:0; z-index: 1000; }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 5px; }
        .brand { font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.3s; box-shadow: 2px 0 15px rgba(0,0,0,0.2); }
        .sidebar.open { left: 0; }
        .sidebar-header { background: var(--header); padding: 25px; font-weight: bold; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .sidebar-item { padding: 18px 25px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: 600; font-size: 15px; color: #444; }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        .view { display: none; }
        .active { display: block; }

        .box { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h4 { margin: 0 0 15px 0; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-add-item { background: #f0f4ff; color: var(--accent); margin-top: 10px; border: 1px dashed var(--accent); }

        /* Clientes y Pestañas Originales */
        .cli-card { background: white; border-radius: 15px; margin-bottom: 12px; border-left: 6px solid var(--accent); overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cli-head { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .cli-body { display: none; padding: 15px; background: #fafafa; border-top: 1px solid #eee; }

        .art-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .art-header { display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; }
        .art-content { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; }

        /* Ticket Rosa (Tarjeta Real) */
        #ticket-wrapper { position: absolute; left: -9999px; }
        .pink-ticket { width: 350px; background: #ffc0cb; padding: 20px; color: #000; font-family: Arial, sans-serif; border: 1px solid #000; }
        .pink-header { border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-size: 13px; }
        .pink-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .pink-table th, .pink-table td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 11px; height: 20px; }

        /* Modal Personalizado */
        #modal-ov { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:3000; align-items:center; justify-content:center; }
        .modal-box { background:white; width:90%; max-width:380px; border-radius:20px; overflow:hidden; }
    </style>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="sidebar-header" id="side-brand">ABONERO APP</div>
    <div class="sidebar-menu">
        <div class="sidebar-item" onclick="showView('v-ruta')">📍 Mi Ruta de Cobro</div>
        <div class="sidebar-item" onclick="showView('v-nueva')">➕ Nuevo Cliente</div>
        <div class="sidebar-item" onclick="showView('v-config')">⚙️ Personalizar Mueblería</div>
    </div>
</div>

<header>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="brand" id="header-title">ABONERO APP</div>
    <div style="width:30px"></div>
</header>

<div class="container">
    <div id="v-ruta" class="view active">
        <button class="btn" style="background:#00b894; color:white; margin-bottom:15px;" onclick="ordenarRuta()">📍 ACTIVAR RUTA INTELIGENTE (CP)</button>
        <div id="lista-clientes"></div>
    </div>

    <div id="v-nueva" class="view">
        <div class="box">
            <h4>Registro de Cliente</h4>
            <input type="text" id="reg-nom" placeholder="Nombre completo">
            <input type="text" id="reg-calle" placeholder="Calle y Número">
            <input type="text" id="reg-col" placeholder="Colonia">
            <input type="number" id="reg-cp" placeholder="Código Postal">
            <input type="text" id="reg-art" placeholder="Primer Artículo (ej. Sala)">
            <input type="number" id="reg-saldo" placeholder="Saldo Inicial $">
            <button class="btn btn-main" onclick="guardarClienteNuevo()">GUARDAR REGISTRO</button>
        </div>
    </div>

    <div id="v-config" class="view">
        <div class="box">
            <h4>Personalizar Mi Negocio</h4>
            <label>Nombre de la Mueblería:</label>
            <input type="text" id="cfg-nom" placeholder="Ej. Mueblería Olimpo">
            <label>Logotipo:</label>
            <input type="file" accept="image/*" onchange="cargarLogo(event)">
            <img id="logo-v" style="max-height:60px; display:none; margin:10px auto;">
            <button class="btn btn-main" onclick="guardarConfig()">APLICAR CAMBIOS</button>
        </div>
    </div>
</div>

<div id="modal-ov">
    <div class="modal-box">
        <div style="background:var(--header); padding:15px; font-weight:bold; text-align:center;">AboneroApp</div>
        <div id="m-body" style="padding:20px; text-align:center;"></div>
        <div id="m-foot" style="padding:10px; border-top:1px solid #eee;"></div>
    </div>
</div>

<div id="ticket-wrapper">
    <div class="pink-ticket" id="final-ticket">
        <div style="text-align:center;">
            <img id="t-logo" style="max-height:40px; display:none; margin:0 auto;">
            <h3 id="t-muebleria" style="margin:5px 0;">MUEBLERÍA</h3>
        </div>
        <div class="pink-header">
            <div>Nombre: <span id="t-nom"></span></div>
            <div>Dirección: <span id="t-dir"></span></div>
            <div>Artículo: <span id="t-art"></span></div>
        </div>
        <table class="pink-table">
            <thead><tr><th>Fecha</th><th>Abono</th><th>Resta</th></tr></thead>
            <tbody id="t-rows"></tbody>
        </table>
    </div>
</div>

<script>
    // MEMORIA DE LARGO PLAZO
    let db = JSON.parse(localStorage.getItem('abo_master_db')) || {};
    let config = JSON.parse(localStorage.getItem('abo_master_cfg')) || { nombre: "ABONERO APP", logo: "" };

    function init() {
        document.getElementById('header-title').innerText = config.nombre;
        document.getElementById('cfg-nom').value = config.nombre;
        if(config.logo) {
            document.getElementById('logo-v').src = config.logo;
            document.getElementById('logo-v').style.display = 'block';
            document.getElementById('t-logo').src = config.logo;
            document.getElementById('t-logo').style.display = 'block';
        }
        renderRuta();
    }

    // Funciones de Interfaz
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function showView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        toggleSidebar();
    }
    function avisar(m, f='') {
        document.getElementById('m-body').innerText = m;
        document.getElementById('m-foot').innerHTML = f || `<button class="btn btn-main" onclick="document.getElementById('modal-ov').style.display='none'">ACEPTAR</button>`;
        document.getElementById('modal-ov').style.display = 'flex';
    }

    // Configuración
    function cargarLogo(e) {
        const reader = new FileReader();
        reader.onload = () => {
            config.logo = reader.result;
            document.getElementById('logo-v').src = config.logo;
            document.getElementById('logo-v').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    }
    function guardarConfig() {
        config.nombre = document.getElementById('cfg-nom').value.toUpperCase();
        localStorage.setItem('abo_master_cfg', JSON.stringify(config));
        location.reload();
    }

    // Lógica de Negocio
    function guardarClienteNuevo() {
        const nom = document.getElementById('reg-nom').value.toUpperCase().trim();
        const calle = document.getElementById('reg-calle').value;
        const col = document.getElementById('reg-col').value;
        const cp = document.getElementById('reg-cp').value;
        const art = document.getElementById('reg-art').value;
        const saldo = parseFloat(document.getElementById('reg-saldo').value);

        if(!nom || isNaN(saldo)) return avisar("⚠️ Nombre y Saldo requeridos.");

        if(!db[nom]) {
            db[nom] = { nom, dir: `${calle}, Col. ${col}`, cp, articulos: [] };
        }
        db[nom].articulos.push({ id: Date.now(), mueble: art, saldo: saldo, historial: [] });
        
        localStorage.setItem('abo_master_db', JSON.stringify(db));
        renderRuta();
        showView('v-ruta');
    }

    function agregarArticulo(nomCli) {
        const mueble = prompt("Descripción del nuevo mueble:");
        const saldo = parseFloat(prompt("Saldo inicial:"));
        if(!mueble || isNaN(saldo)) return;

        db[nomCli].articulos.push({ id: Date.now(), mueble, saldo, historial: [] });
        localStorage.setItem('abo_master_db', JSON.stringify(db));
        renderRuta();
    }

    function renderRuta() {
        const root = document.getElementById('lista-clientes');
        root.innerHTML = "";
        Object.values(db).forEach(cli => {
            let artsHTML = cli.articulos.map(a => `
                <div class="art-card">
                    <div class="art-header" onclick="toggle('c-${a.id}')">
                        <span>📦 ${a.mueble}</span>
                        <b style="color:var(--accent)">$${a.saldo}</b>
                    </div>
                    <div id="c-${a.id}" class="art-content">
                        <input type="number" id="inp-${a.id}" placeholder="Monto abono $">
                        <button class="btn btn-main" onclick="abonar('${cli.nom}', ${a.id})">COBRAR ABONO</button>
                    </div>
                </div>
            `).join('');

            root.innerHTML += `
                <div class="cli-card">
                    <div class="cli-head" onclick="toggle('cli-${cli.nom.replace(/\s/g,'')}')">
                        <div><strong>${cli.nom}</strong><br><small>${cli.dir}</small></div>
                        <span>▼</span>
                    </div>
                    <div id="cli-${cli.nom.replace(/\s/g,'')}" class="cli-body">
                        ${artsHTML}
                        <button class="btn btn-add-item" onclick="agregarArticulo('${cli.nom}')">➕ AGREGAR OTRO ARTÍCULO</button>
                    </div>
                </div>
            `;
        });
    }

    function abonar(nomCli, artId) {
        const input = document.getElementById(`inp-${artId}`);
        const monto = parseFloat(input.value);
        if(!monto) return;

        const art = db[nomCli].articulos.find(x => x.id === artId);
        art.saldo = (art.saldo - monto).toFixed(2);
        art.historial.push({ f: new Date().toLocaleDateString(), m: monto, r: art.saldo });

        localStorage.setItem('abo_master_db', JSON.stringify(db));
        renderRuta();
        imprimir(nomCli, art);
    }

    function imprimir(nomCli, art) {
        document.getElementById('t-muebleria').innerText = config.nombre;
        document.getElementById('t-nom').innerText = nomCli;
        document.getElementById('t-dir').innerText = db[nomCli].dir;
        document.getElementById('t-art').innerText = art.mueble;

        const tbody = document.getElementById('t-rows');
        tbody.innerHTML = "";
        for(let i=0; i<15; i++) {
            const h = art.historial[i] || { f:"", m:"", r:"" };
            tbody.innerHTML += `<tr><td>${h.f}</td><td>${h.m?'$'+h.m:''}</td><td>${h.r?'$'+h.r:''}</td></tr>`;
        }

        avisar("🖼️ Generando Tarjeta de Abono...");
        setTimeout(() => {
            html2canvas(document.getElementById('final-ticket')).then(canvas => {
                const link = document.createElement('a');
                link.download = `Ticket_${nomCli}.png`;
                link.href = canvas.toDataURL();
                link.click();
                document.getElementById('modal-ov').style.display='none';
            });
        }, 800);
    }

    function ordenarRuta() {
        let arr = Object.values(db).sort((a,b) => (parseInt(a.cp)||0) - (parseInt(b.cp)||0));
        let nDB = {}; arr.forEach(x => nDB[x.nom] = x);
        db = nDB; renderRuta();
        avisar("📍 Ruta ordenada por Código Postal.");
    }

    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    init();
</script>
</body>
</html>
