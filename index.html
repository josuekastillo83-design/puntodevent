<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bitacora Pro - Cloud Elite</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, get, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7xEDb_sa_C76G6KA5cQMsd3w-h83hpb0",
            authDomain: "bitacoregust.firebaseapp.com",
            databaseURL: "https://bitacoregust-default-rtdb.firebaseio.com",
            projectId: "bitacoregust",
            storageBucket: "bitacoregust.firebasestorage.app",
            messagingSenderId: "155618684015",
            appId: "1:155618684015:web:ebea5a55a678395c9df19a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentOwnerUid = "";
        let isOwner = false;

        // --- VENTANAS DE CONFIRMACIÓN PERSONALIZADAS ---
        window.notificar = (titulo, msg) => {
            document.getElementById('m-title').innerText = titulo;
            document.getElementById('m-msg').innerText = msg;
            document.getElementById('bitacora-modal').style.display = 'flex';
        };
        window.cerrarM = () => document.getElementById('bitacora-modal').style.display = 'none';

        // --- ACCESO Y REGISTRO ---
        window.handleAuth = async () => {
            const biz = document.getElementById('l-biz').value.toLowerCase().trim();
            const user = document.getElementById('l-user').value.toLowerCase().trim();
            const pass = document.getElementById('l-pass').value;

            if (user.includes('@')) {
                signInWithEmailAndPassword(auth, user, pass).catch(e => notificar("Bitacora Pro", "Error Dueño: " + e.message));
            } else {
                if(!biz) return notificar("Bitacora Pro", "Ingresa nombre de Mueblería");
                const bSnap = await get(ref(db, `nombres_mueblerias/${biz}`));
                if(!bSnap.exists()) return notificar("Bitacora Pro", "Mueblería no encontrada");
                const uid = bSnap.val().ownerUid;
                const sSnap = await get(ref(db, `mueblerias/${uid}/staff/${user}`));
                if(sSnap.exists() && sSnap.val().pass === pass) {
                    localStorage.setItem('staff_session', JSON.stringify({ uid, user, biz }));
                    location.reload();
                } else { notificar("Bitacora Pro", "Clave de cobrador incorrecta"); }
            }
        };

        window.registerOwner = () => {
            const biz = document.getElementById('r-biz').value.toLowerCase().trim();
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            if(!biz || !email || pass.length < 6) return notificar("Bitacora Pro", "Datos incompletos");

            createUserWithEmailAndPassword(auth, email, pass).then(u => {
                set(ref(db, `nombres_mueblerias/${biz}`), { ownerUid: u.user.uid });
                set(ref(db, `mueblerias/${u.user.uid}/config`), { nombre: biz, email: email });
                location.reload();
            }).catch(e => notificar("Bitacora Pro", e.message));
        };

        window.handleLogout = () => {
            localStorage.clear();
            signOut(auth).then(() => location.reload());
        };

        // --- MONITOR DE SESIÓN (CORREGIDO) ---
        onAuthStateChanged(auth, user => {
            const staff = JSON.parse(localStorage.getItem('staff_session'));
            document.getElementById('splash').style.display = 'none';
            
            if (user || staff) {
                // Hay sesión: Mostrar App
                currentOwnerUid = user ? user.uid : staff.uid;
                isOwner = !!user;
                document.getElementById('view-auth').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                
                if(isOwner) {
                    document.getElementById('owner-panel').style.display = 'block';
                    onValue(ref(db, `mueblerias/${currentOwnerUid}/staff`), s => renderStaff(s.val()));
                }
                onValue(ref(db, `mueblerias/${currentOwnerUid}/clientes`), s => renderClientes(s.val()));
            } else {
                // No hay sesión: Mostrar Login obligatoriamente
                document.getElementById('view-auth').style.display = 'flex';
                document.getElementById('app-ui').style.display = 'none';
            }
        });

        // --- FUNCIONES DE BASE DE DATOS ---
        window.crearStaff = () => {
            const u = document.getElementById('new-u').value.toLowerCase().trim();
            const p = document.getElementById('new-p').value;
            if(!u || !p) return notificar("Bitacora Pro", "Faltan datos");
            set(ref(db, `mueblerias/${currentOwnerUid}/staff/${u}`), { user: u, pass: p })
            .then(() => notificar("Bitacora Pro", "Cobrador registrado"));
        };

        window.crearCliente = () => {
            const nom = document.getElementById('c-nom').value.toUpperCase().trim();
            const dir = document.getElementById('c-dir').value.trim();
            if(!nom) return;
            set(ref(db, `mueblerias/${currentOwnerUid}/clientes/${Date.now()}`), { nombre: nom, direccion: dir });
        };
    </script>

    <style>
        :root { --blue: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-blue { background: var(--blue); color: white; }
        
        /* Modal Bitacora Pro */
        #bitacora-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .m-box { background: white; width: 85%; max-width: 350px; border-radius: 15px; overflow: hidden; text-align: center; }
        .m-head { background: var(--blue); color: white; padding: 12px; font-weight: bold; }
        .m-body { padding: 20px; color: #444; }

        /* Acordeones */
        .acc-card { border: 1px solid #eee; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .acc-header { background: #f1f3f4; padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .acc-content { display: none; padding: 12px; background: white; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="splash" style="position:fixed; inset:0; background:white; z-index:1000; display:flex; justify-content:center; align-items:center;">
        <img src="1000123395.png" style="width:100px;">
    </div>

    <div id="bitacora-modal">
        <div class="m-box">
            <div class="m-head" id="m-title">Bitacora Pro</div>
            <div class="m-body" id="m-msg"></div>
            <button class="btn btn-blue" onclick="cerrarM()" style="border-radius:0;">ACEPTAR</button>
        </div>
    </div>

    <div id="view-auth" style="display:none; flex-direction:column; padding:30px; height:100vh; justify-content:center; background:white;">
        <h2 style="text-align:center; color:var(--blue);">Bitacora Pro</h2>
        
        <div style="display:flex; justify-content:center; gap:25px; margin-bottom:20px;">
            <b id="btn-show-l" onclick="showForm('l')" style="cursor:pointer; color:var(--blue); border-bottom:2px solid var(--blue);">ENTRAR</b>
            <b id="btn-show-r" onclick="showForm('r')" style="cursor:pointer; color:#777;">NUEVO DUEÑO</b>
        </div>

        <div id="f-l">
            <input type="text" id="l-biz" placeholder="Nombre de Mueblería">
            <input type="text" id="l-user" placeholder="Correo o Usuario">
            <input type="password" id="l-pass" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="handleAuth()">INGRESAR</button>
        </div>

        <div id="f-r" style="display:none;">
            <input type="text" id="r-biz" placeholder="Nombre de tu Mueblería">
            <input type="email" id="r-email" placeholder="Correo Maestro">
            <input type="password" id="r-pass" placeholder="Contraseña (mín 6)">
            <button class="btn btn-blue" onclick="registerOwner()">CREAR NEGOCIO</button>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <header>BITACORA PRO <i class="fas fa-sign-out-alt" onclick="handleLogout()"></i></header>

        <div id="owner-panel" style="display:none;" class="card">
            <h4 style="margin:0;">Administrar Cobradores</h4>
            <input type="text" id="new-u" placeholder="Usuario Cobrador">
            <input type="password" id="new-p" placeholder="Clave">
            <button class="btn btn-blue" onclick="crearStaff()">GUARDAR</button>
            <div id="staff-render"></div>
        </div>

        <div class="card">
            <h4>Nuevo Cliente</h4>
            <input type="text" id="c-nom" placeholder="Nombre">
            <input type="text" id="c-dir" placeholder="Dirección">
            <button class="btn btn-blue" onclick="crearCliente()">GUARDAR</button>
        </div>
        <div id="clientes-render"></div>
    </div>

<script>
    window.showForm = (mode) => {
        document.getElementById('f-l').style.display = mode === 'l' ? 'block' : 'none';
        document.getElementById('f-r').style.display = mode === 'r' ? 'block' : 'none';
        document.getElementById('btn-show-l').style.color = mode === 'l' ? '#1a73e8' : '#777';
        document.getElementById('btn-show-l').style.borderBottom = mode === 'l' ? '2px solid #1a73e8' : 'none';
        document.getElementById('btn-show-r').style.color = mode === 'r' ? '#1a73e8' : '#777';
        document.getElementById('btn-show-r').style.borderBottom = mode === 'r' ? '2px solid #1a73e8' : 'none';
    };

    function renderStaff(data) {
        const div = document.getElementById('staff-render');
        div.innerHTML = "";
        if(!data) return;
        Object.values(data).forEach(s => {
            div.innerHTML += `
                <div class="acc-card">
                    <div class="acc-header" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                        👤 ${s.user.toUpperCase()} <span>▼</span>
                    </div>
                    <div class="acc-content">
                        <p>Clave: ${s.pass}</p>
                        <button class="btn" style="background:#fce8e6; color:red;" onclick="removeStaff('${s.user}')">ELIMINAR</button>
                    </div>
                </div>`;
        });
    }

    function renderClientes(data) {
        const div = document.getElementById('clientes-render');
        div.innerHTML = "";
        if(!data) return;
        Object.values(data).forEach(cli => {
            div.innerHTML += `<div class="card"><strong>${cli.nombre}</strong><br><small>${cli.direccion}</small></div>`;
        });
    }
</script>
</body>
</html>
