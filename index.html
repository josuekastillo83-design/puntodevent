<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nexvent - tu punto de venta</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --accent: #00f2fe;
            --success: #2ed573;
            --danger: #ff4757;
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #000000;
            --border-color: #eee;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }

        .top-bar {
            background: #000; color: white; padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000;
        }
        .top-bar-brand { display: flex; align-items: center; gap: 10px; }
        .bar-name { font-weight: 300; font-size: 1.4em; letter-spacing: -1px; }
        .bar-name span { color: var(--accent); font-weight: 600; }

        .navbar { background: #111; display: flex; overflow-x: auto; border-bottom: 1px solid #333; position: sticky; top: 59px; z-index: 999; }
        .nav-btn { padding: 15px 18px; border: none; background: transparent; color: #666; font-size: 10px; text-transform: uppercase; flex-shrink: 0; }
        .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .main-content { flex-grow: 1; padding: 15px; padding-bottom: 100px; }
        .section { display: none; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        .card { background: var(--bg-card); border-radius: 18px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border-color); }
        .input-style { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border-color); font-size: 15px; outline: none; background: rgba(128,128,128,0.05); color: var(--text-main); }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #000; color: white; font-weight: 600; cursor: pointer; margin-bottom: 5px; }
        
        .total-box { background: #000; color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid var(--accent); }
        .total-box h2 { font-size: 3em; margin: 0; color: var(--accent); }

        /* ESTILO TICKET */
        #ticket-view { 
            display: none; background: #fff; color: #000; padding: 20px; 
            font-family: 'Courier New', Courier, monospace; border: 1px solid #ddd;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 4px; margin-top: 15px;
        }
        .ticket-header { text-align: center; border-bottom: 1px dashed #000; margin-bottom: 10px; padding-bottom: 10px; }
        .ticket-row { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); width: 90%; max-width: 380px; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body onload="initApp()">

    <div class="top-bar">
        <div class="top-bar-brand"><div class="bar-name" id="bar-display">nex<span>vent</span></div></div>
    </div>

    <div class="navbar">
        <button class="nav-btn active" onclick="showSec('pos', this)">caja</button>
        <button class="nav-btn" onclick="showSec('stock', this)">stock</button>
        <button class="nav-btn" onclick="showSec('corte', this)">corte</button>
        <button class="nav-btn" onclick="showSec('vip', this)">vip</button>
    </div>

    <div class="main-content">
        <div id="pos" class="section active">
            <input type="text" id="sku-in" class="input-style" placeholder="Escanea o escribe SKU..." onkeypress="handleSKU(event)">
            <button onclick="toggleCam('reader-pos', 'sale')" class="btn-main" style="background:#222;">📷 Abrir Cámara</button>
            <div id="reader-pos"></div>
            
            <div class="card" id="cart-container">
                <table style="width:100%;">
                    <thead><tr style="text-align:left; font-size:10px; color:#888;"><th>PROD</th><th>CANT</th><th>TOTAL</th><th></th></tr></thead>
                    <tbody id="cart-body"></tbody>
                </table>
            </div>

            <div class="total-box"><small>TOTAL A COBRAR</small><h2 id="total-val">$0.00</h2></div>
            
            <div id="pos-actions">
                <button class="btn-main" onclick="openPaymentModal()" style="background:var(--accent); color:#000;">Finalizar y Cobrar</button>
            </div>

            <div id="ticket-view">
                <div class="ticket-header">
                    <h3 id="t-store-name">NEXVENT</h3>
                    <small id="t-date"></small>
                </div>
                <div id="t-items"></div>
                <div style="border-top: 1px dashed #000; margin-top: 10px; padding-top: 10px;">
                    <div class="ticket-row"><b>TOTAL:</b> <b id="t-total"></b></div>
                </div>
                <p style="text-align:center; font-size: 0.8em; margin-top: 15px;">¡Gracias por su compra!</p>
            </div>
            
            <button id="btn-wa" class="btn-main" style="display:none; background:#25D366;" onclick="sendWhatsApp()">📤 Enviar por WhatsApp</button>
            <button id="btn-next" class="btn-main" style="display:none; background:#888;" onclick="resetPos()">Nueva Venta</button>
        </div>

        <div id="stock" class="section">
            <div class="card">
                <input type="text" id="s-sku" class="input-style" placeholder="SKU">
                <input type="text" id="s-nom" class="input-style" placeholder="Nombre">
                <input type="number" id="s-buy" class="input-style" placeholder="Costo Compra">
                <input type="number" id="s-sell" class="input-style" placeholder="Precio Venta">
                <input type="number" id="s-sto" class="input-style" placeholder="Cantidad">
                <button class="btn-main" onclick="addInv()">Guardar Inventario</button>
            </div>
            <div id="inv-list-container"></div>
        </div>

        <div id="corte" class="section">
            <div class="card" style="text-align:center;">
                <small>GANANCIA REAL</small>
                <h1 id="c-profit" style="color:var(--success); font-size:3em;">$0.00</h1>
                <p>Caja: <b id="c-balance">$0.00</b></p>
                <button class="btn-main" onclick="resetCorte()">Cerrar Caja</button>
            </div>
        </div>

        <div id="vip" class="section">
            <div class="card">
                <h3>Configuración</h3>
                <input type="text" id="set-name" class="input-style" placeholder="Nombre de tu negocio" oninput="updateVIP('name', this.value)">
                <input type="number" id="set-scan-wait" class="input-style" placeholder="Segundos entre escaneo" oninput="updateVIP('scanWait', this.value)">
            </div>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <h2 id="m-total">Total: $0.00</h2>
            <input type="number" id="cash-rec" class="input-style" placeholder="Efectivo recibido" oninput="calcChange()">
            <h2 id="change-text">$0.00 cambio</h2>
            <button class="btn-main" onclick="confirmPayment()">Confirmar Pago</button>
            <button class="btn-main" style="background:transparent; color:#888;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>

<script>
    let db, scanner, cart = [], lastScanTime = 0;

    function initApp() {
        db = {
            inv: JSON.parse(localStorage.getItem('n_inv')) || [],
            vEfe: parseFloat(localStorage.getItem('n_v_e')) || 0,
            ganancia: parseFloat(localStorage.getItem('n_gan')) || 0,
            cfg: JSON.parse(localStorage.getItem('n_cfg')) || { name: 'NEXVENT', scanWait: 2 }
        };
        document.getElementById('set-name').value = db.cfg.name;
        document.getElementById('set-scan-wait').value = db.cfg.scanWait;
        renderInv(); applyVIP();
    }

    function save() {
        localStorage.setItem('n_inv', JSON.stringify(db.inv));
        localStorage.setItem('n_v_e', db.vEfe);
        localStorage.setItem('n_gan', db.ganancia);
        localStorage.setItem('n_cfg', JSON.stringify(db.cfg));
    }

    function process(code, mode = 'sale') {
        const now = Date.now();
        if (now - lastScanTime < (db.cfg.scanWait * 1000)) return;
        lastScanTime = now;

        const p = db.inv.find(x => x.sku === code);
        if(p) {
            if(mode === 'sale') {
                const i = cart.find(x => x.sku === code);
                if(i) i.q++; else cart.push({...p, q: 1});
                renderCart();
            } else {
                document.getElementById('s-sku').value = code;
                showSec('stock', document.querySelector('[onclick*="stock"]'));
            }
        } else {
            document.getElementById('s-sku').value = code;
            showSec('stock', document.querySelector('[onclick*="stock"]'));
        }
    }

    function renderCart() {
        let t = 0;
        document.getElementById('cart-body').innerHTML = cart.map((i, idx) => {
            t += (i.sell * i.q);
            return `<tr><td>${i.name}</td><td>${i.q}</td><td>$${(i.sell*i.q).toFixed(2)}</td><td onclick="cart.splice(${idx},1);renderCart()">❌</td></tr>`;
        }).join('');
        document.getElementById('total-val').innerText = `$${t.toFixed(2)}`;
    }

    function confirmPayment() {
        const total = parseFloat(document.getElementById('total-val').innerText.replace('$',''));
        let gain = 0;
        let itemsHtml = "";
        
        cart.forEach(i => {
            gain += (i.sell - i.buy) * i.q;
            itemsHtml += `<div class="ticket-row"><span>${i.q}x ${i.name}</span><span>$${(i.sell*i.q).toFixed(2)}</span></div>`;
            const p = db.inv.find(x => x.sku === i.sku); if(p) p.stock -= i.q;
        });

        db.vEfe += total; db.ganancia += gain; save();

        // MOSTRAR TICKET
        document.getElementById('t-date').innerText = new Date().toLocaleString();
        document.getElementById('t-items').innerHTML = itemsHtml;
        document.getElementById('t-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('t-store-name').innerText = db.cfg.name.toUpperCase();
        
        document.getElementById('ticket-view').style.display = 'block';
        document.getElementById('btn-wa').style.display = 'block';
        document.getElementById('btn-next').style.display = 'block';
        document.getElementById('cart-container').style.display = 'none';
        document.getElementById('pos-actions').style.display = 'none';
        
        closeModal();
    }

    function sendWhatsApp() {
        const total = document.getElementById('t-total').innerText;
        let text = `*${db.cfg.name}*\n_Recibo de compra_\n\n`;
        cart.forEach(i => { text += `• ${i.q} ${i.name} - $${(i.sell*i.q).toFixed(2)}\n`; });
        text += `\n*TOTAL: ${total}*\n¡Gracias por su preferencia!`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function resetPos() {
        cart = []; renderCart();
        document.getElementById('ticket-view').style.display = 'none';
        document.getElementById('btn-wa').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('cart-container').style.display = 'block';
        document.getElementById('pos-actions').style.display = 'block';
        document.getElementById('sku-in').value = '';
    }

    function addInv() {
        const sku = document.getElementById('s-sku').value;
        const nom = document.getElementById('s-nom').value;
        const buy = parseFloat(document.getElementById('s-buy').value) || 0;
        const sell = parseFloat(document.getElementById('s-sell').value) || 0;
        const sto = parseInt(document.getElementById('s-sto').value) || 0;
        const ex = db.inv.find(x => x.sku === sku);
        if(ex) { ex.stock += sto; ex.buy = buy; ex.sell = sell; if(nom) ex.name = nom; }
        else db.inv.push({sku, name: nom || 'Producto', buy, sell, stock: sto});
        save(); renderInv(); alert("Guardado");
    }

    function renderInv() {
        document.getElementById('inv-list-container').innerHTML = db.inv.map(p => 
            `<div class="card"><b>${p.name}</b><br><small>Stock: ${p.stock} | SKU: ${p.sku}</small></div>`
        ).join('');
    }

    function applyVIP() { document.getElementById('bar-display').innerHTML = db.cfg.name.replace('vent', '<span>vent</span>'); }
    function updateVIP(t, v) { db.cfg[t] = v; applyVIP(); save(); }
    function showSec(id, b) { document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); b.classList.add('active'); if(id==='corte'){ document.getElementById('c-balance').innerText=`$${db.vEfe.toFixed(2)}`; document.getElementById('c-profit').innerText=`$${db.ganancia.toFixed(2)}`; } }
    function toggleCam(id, m) { const r=document.getElementById(id); if(r.style.display==='block'){ if(scanner) scanner.stop(); r.style.display='none'; } else { r.style.display='block'; scanner=new Html5Qrcode(id); scanner.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>process(t, m)); } }
    function handleSKU(e) { if(e.key === 'Enter') { process(e.target.value); e.target.value = ''; } }
    function openPaymentModal() { if(cart.length) { document.getElementById('m-total').innerText = `Total: ${document.getElementById('total-val').innerText}`; document.getElementById('payment-modal').style.display='flex'; } }
    function closeModal() { document.getElementById('payment-modal').style.display='none'; }
    function calcChange() { const t = parseFloat(document.getElementById('total-val').innerText.replace('$','')); const r = parseFloat(document.getElementById('cash-rec').value)||0; document.getElementById('change-text').innerText = `$${(r-t).toFixed(2)} cambio`; }
    function resetCorte() { if(confirm("¿Cerrar caja?")){ db.vEfe=0; db.ganancia=0; save(); showSec('corte', document.querySelector('[onclick*="corte"]')); } }
</script>
</body>
</html>
