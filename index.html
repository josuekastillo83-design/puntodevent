<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXVENTA PRO</title>

<style>
:root{
    --color:#3483fa;
}
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}
header{
    background:var(--color);
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}
.container{padding:15px;}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
input,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:var(--color);
    color:white;
    border:none;
}
.client{
    background:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
img{max-width:100%;border-radius:10px;}
</style>
</head>

<body>

<header>NEXVENTA PRO</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Iniciar sesión</h3>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>

<h4>Registro</h4>
<input id="remail" placeholder="Correo">
<input id="rpass" type="password" placeholder="Contraseña">
<button onclick="register()">Crear cuenta</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<h3>Nueva venta</h3>
<input id="name" placeholder="Cliente">
<input id="address" placeholder="Dirección">
<input id="item" placeholder="Artículo">
<input id="price" type="number" placeholder="Saldo">

<input type="file" id="photo">
<img id="preview" style="display:none;">

<button onclick="save()">Guardar</button>
</div>

<button onclick="logout()">Cerrar sesión</button>

<div id="list"></div>

</div>

</div>

<script>
// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || {};
let db = JSON.parse(localStorage.getItem("db")) || {};
let session = localStorage.getItem("session");

// INIT
if(session){
    showApp();
}

// LOGIN
function login(){
    let e=email.value;
    let p=pass.value;

    if(users[e]===p){
        localStorage.setItem("session",e);
        showApp();
    }else{
        alert("Error");
    }
}

// REGISTRO
function register(){
    let e=remail.value;
    let p=rpass.value;

    users[e]=p;
    localStorage.setItem("users",JSON.stringify(users));
    alert("Usuario creado");
}

// APP
function showApp(){
    loginDiv=document.getElementById("login");
    appDiv=document.getElementById("app");

    loginDiv.style.display="none";
    appDiv.style.display="block";

    render();
}

// LOGOUT
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// FOTO
photo.onchange=e=>{
    let reader=new FileReader();
    reader.onload=()=>{
        preview.src=reader.result;
        preview.style.display="block";
    }
    reader.readAsDataURL(e.target.files[0]);
}

// GUARDAR
function save(){
    let n=name.value;
    let a=address.value;
    let i=item.value;
    let p=parseFloat(price.value);

    if(!n||!i||isNaN(p)) return alert("Faltan datos");

    if(!db[n]){
        db[n]={name:n,address:a,photo:preview.src,items:[]};
    }

    db[n].items.push({item:i,balance:p});

    localStorage.setItem("db",JSON.stringify(db));

    name.value="";
    address.value="";
    item.value="";
    price.value="";
    preview.style.display="none";

    render();
}

// RENDER
function render(){
    let list=document.getElementById("list");
    list.innerHTML="";

    Object.values(db).forEach(c=>{

        let html=`
        <div class="client">
        <h4>${c.name}</h4>
        <p>${c.address}</p>
        ${c.photo?`<img src="${c.photo}">`:""}
        `;

        c.items.forEach(it=>{
            html+=`
            <p>${it.item} - $${it.balance}</p>
            <button onclick="pay('${c.name}','${it.item}')">Abonar</button>
            `;
        });

        html+="</div>";

        list.innerHTML+=html;
    });
}

// ABONO
function pay(client,item){
    let amount=parseFloat(prompt("Monto"));

    if(isNaN(amount)) return;

    let acc=db[client].items.find(i=>i.item===item);

    acc.balance=(acc.balance-amount).toFixed(2);

    localStorage.setItem("db",JSON.stringify(db));
    render();
}
</script>

</body>
</html>
