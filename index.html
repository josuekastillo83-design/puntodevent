<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bitacora Pro - Sistema Integral</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, get, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7xEDb_sa_C76G6KA5cQMsd3w-h83hpb0",
            authDomain: "bitacoregust.firebaseapp.com",
            databaseURL: "https://bitacoregust-default-rtdb.firebaseio.com",
            projectId: "bitacoregust",
            storageBucket: "bitacoregust.firebasestorage.app",
            messagingSenderId: "155618684015",
            appId: "1:155618684015:web:ebea5a55a678395c9df19a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentOwnerUid = "";
        let isOwner = false;

        // Base de datos de Colonias Zuazua y Pesquería
        const DATA_CP = {
            "65750": { mun: "Gral. Zuazua", cols: ["Centro Zuazua", "Real de Zuazua", "Portal del Norte"] },
            "65760": { mun: "Gral. Zuazua", cols: ["Real Palmas", "Valle de Santa Elena", "Misión de Santa Elena", "Hacienda San Pedro"] },
            "66650": { mun: "Pesquería", cols: ["Centro Pesquería", "Colinas del Aeropuerto"] },
            "66653": { mun: "Pesquería", cols: ["Villas Regina", "Paseo Lindavista", "Las Haciendas"] },
            "66670": { mun: "Pesquería", cols: ["Valle de Santa María", "Lomas de Pesquería"] }
        };

        // --- SISTEMA DE NOTIFICACIONES ---
        window.notificar = (msg, color = "#1a73e8") => {
            const m = document.getElementById('bitacora-modal');
            document.getElementById('m-title').innerText = "Bitacora Pro";
            document.getElementById('m-msg').innerText = msg;
            document.querySelector('.m-head').style.background = color;
            m.style.display = 'flex';
        };

        // --- ACCESO Y SEGURIDAD ---
        window.handleAuth = async () => {
            const biz = document.getElementById('l-biz').value.toLowerCase().trim();
            const user = document.getElementById('l-user').value.toLowerCase().trim();
            const pass = document.getElementById('l-pass').value;

            // Establecer persistencia solo por sesión (se cierra al cerrar app)
            await setPersistence(auth, browserSessionPersistence);

            if (user.includes('@')) {
                signInWithEmailAndPassword(auth, user, pass).catch(e => notificar("Error: " + e.message, "red"));
            } else {
                if(!biz) return notificar("Falta nombre de Mueblería");
                const bSnap = await get(ref(db, `nombres_mueblerias/${biz}`));
                if(!bSnap.exists()) return notificar("Mueblería no registrada");
                const uid = bSnap.val().ownerUid;
                const sSnap = await get(ref(db, `mueblerias/${uid}/staff/${user}`));
                if(sSnap.exists() && sSnap.val().pass === pass) {
                    sessionStorage.setItem('staff_session', JSON.stringify({ uid, user, biz }));
                    location.reload();
                } else { notificar("Usuario o Clave incorrecta", "red"); }
            }
        };

        window.registerOwner = () => {
            const biz = document.getElementById('r-biz').value.toLowerCase().trim();
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            createUserWithEmailAndPassword(auth, email, pass).then(u => {
                set(ref(db, `nombres_mueblerias/${biz}`), { ownerUid: u.user.uid });
                set(ref(db, `mueblerias/${u.user.uid}/config`), { nombreBiz: biz });
                notificar("¡Mueblería Creada! Inicia sesión.");
                location.reload();
            }).catch(e => notificar(e.message, "red"));
        };

        // --- MONITOR DE ESTADO ---
        onAuthStateChanged(auth, user => {
            const staff = JSON.parse(sessionStorage.getItem('staff_session'));
            document.getElementById('splash').style.display = 'none';
            if (user || staff) {
                currentOwnerUid = user ? user.uid : staff.uid;
                isOwner = !!user;
                document.getElementById('view-auth').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                if(isOwner) {
                    document.getElementById('owner-panel').style.display = 'block';
                    onValue(ref(db, `mueblerias/${currentOwnerUid}/staff`), s => renderStaff(s.val()));
                }
                onValue(ref(db, `mueblerias/${currentOwnerUid}/clientes`), s => renderClientes(s.val()));
            } else {
                document.getElementById('view-auth').style.display = 'flex';
                document.getElementById('app-ui').style.display = 'none';
            }
        });

        // --- FUNCIONES DE MUEBLERÍA ---
        window.buscarCP = (cp) => {
            const data = DATA_CP[cp];
            const sel = document.getElementById('c-col');
            if(data) {
                document.getElementById('c-mun').value = data.mun;
                sel.innerHTML = data.cols.map(c => `<option value="${c}">${c}</option>`).join('');
                sel.disabled = false;
            }
        };

        window.crearCliente = () => {
            const nom = document.getElementById('c-nom').value.toUpperCase().trim();
            if(!nom) return notificar("Nombre vacío");
            const cliData = {
                nombre: nom,
                direccion: document.getElementById('c-dir').value,
                colonia: document.getElementById('c-col').value,
                municipio: document.getElementById('c-mun').value,
                cp: document.getElementById('c-cp').value
            };
            push(ref(db, `mueblerias/${currentOwnerUid}/clientes`), cliData)
            .then(() => { 
                notificar("Cliente Guardado", "green");
                document.querySelectorAll('.card-add input').forEach(i => i.value = "");
            });
        };

        window.addMueble = (cliKey) => {
            const art = prompt("Artículo:");
            const total = parseFloat(prompt("Precio total:"));
            if(!art || isNaN(total)) return;
            push(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliKey}/articulos`), {
                nombre: art, saldo: total, total: total, liquidado: false
            });
        };

        window.cobrar = (cliKey, artKey, saldoActual) => {
            const abono = parseFloat(prompt(`Saldo: $${saldoActual}. ¿Monto a abonar?`));
            if(isNaN(abono) || abono <= 0) return;
            let nSaldo = (saldoActual - abono).toFixed(2);
            if(nSaldo <= 0) nSaldo = 0;
            update(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliKey}/articulos/${artKey}`), {
                saldo: parseFloat(nSaldo), liquidado: parseFloat(nSaldo) === 0
            });
        };

        window.crearStaff = () => {
            const u = document.getElementById('new-u').value.trim();
            const p = document.getElementById('new-p').value.trim();
            if(!u || !p) return;
            set(ref(db, `mueblerias/${currentOwnerUid}/staff/${u}`), { pass: p, user: u });
        };

        window.eliminarStaff = (u) => { if(confirm(`¿Borrar a ${u}?`)) remove(ref(db, `mueblerias/${currentOwnerUid}/staff/${u}`)); };

    </script>

    <style>
        :root { --blue: #1a73e8; --green: #1e8e3e; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        
        /* Modales Bitacora */
        #bitacora-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .m-box { background: white; width: 85%; max-width: 350px; border-radius: 15px; overflow: hidden; text-align: center; }
        .m-head { background: var(--blue); color: white; padding: 12px; font-weight: bold; }
        .m-body { padding: 20px; color: #444; }

        /* Acordeones Staff */
        .staff-item { border: 1px solid #eee; border-radius: 10px; margin-top: 8px; }
        .staff-head { background: #f1f3f4; padding: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; border-radius: 10px; }
        .staff-content { display: none; padding: 10px; background: white; border-top: 1px solid #eee; }

        /* Muebles Colores */
        .mueble-box { border-left: 6px solid var(--blue); background: #fafafa; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #eee; border-left-width: 6px; }
        .mueble-box.liquidado { border-left-color: var(--green); background: #e6f4ea; }
    </style>
</head>
<body>

    <div id="splash" style="position:fixed; inset:0; background:white; z-index:1000; display:flex; justify-content:center; align-items:center;">
        <img src="1000123395.png" style="width:100px;">
    </div>

    <div id="bitacora-modal">
        <div class="m-box">
            <div class="m-head" id="m-title">Bitacora Pro</div>
            <div class="m-body" id="m-msg"></div>
            <button class="btn btn-blue" onclick="document.getElementById('bitacora-modal').style.display='none'" style="border-radius:0;">ACEPTAR</button>
        </div>
    </div>

    <div id="view-auth" style="display:none; flex-direction:column; padding:30px; height:100vh; justify-content:center; background:white;">
        <h2 style="text-align:center; color:var(--blue); margin-top:0;">Bitacora Pro</h2>
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
            <b id="tab-l" onclick="showF('l')" style="color:var(--blue); border-bottom:2px solid var(--blue); cursor:pointer;">ENTRAR</b>
            <b id="tab-r" onclick="showF('r')" style="color:#777; cursor:pointer;">NUEVA MUEBLERÍA</b>
        </div>
        <div id="form-l">
            <input type="text" id="l-biz" placeholder="Mueblería (Ej: Olimpo)">
            <input type="text" id="l-user" placeholder="Correo (Dueño) o Usuario">
            <input type="password" id="l-pass" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="handleAuth()">INGRESAR AL SISTEMA</button>
        </div>
        <div id="form-r" style="display:none;">
            <input type="text" id="r-biz" placeholder="Nombre de tu Mueblería">
            <input type="email" id="r-email" placeholder="Correo Maestro">
            <input type="password" id="r-pass" placeholder="Clave Maestra">
            <button class="btn btn-blue" onclick="registerOwner()">CREAR NEGOCIO</button>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <header>BITACORA PRO <i class="fas fa-sign-out-alt" onclick="auth.signOut(); sessionStorage.clear(); location.reload();"></i></header>

        <div id="owner-panel" style="display:none;" class="card">
            <h4 style="margin:0;">Administración de Staff</h4>
            <input type="text" id="new-u" placeholder="Nombre de Usuario">
            <input type="text" id="new-p" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="crearStaff()">GUARDAR COBRADOR</button>
            <div id="staff-list-render" style="margin-top:15px;"></div>
        </div>

        <div class="card card-add">
            <h4>Registro de Cliente</h4>
            <input type="text" id="c-nom" placeholder="NOMBRE COMPLETO">
            <input type="number" id="c-cp" placeholder="C.P. (Zuazua/Pesquería)" oninput="buscarCP(this.value)">
            <select id="c-col" disabled><option>Ingresa C.P.</option></select>
            <input type="text" id="c-mun" placeholder="Municipio" readonly>
            <input type="text" id="c-dir" placeholder="CALLE Y NÚMERO">
            <button class="btn btn-blue" onclick="crearCliente()">+ GUARDAR CLIENTE</button>
        </div>

        <div id="render-clientes"></div>
    </div>

<script>
    function showF(m) {
        document.getElementById('form-l').style.display = m === 'l' ? 'block' : 'none';
        document.getElementById('form-r').style.display = m === 'r' ? 'block' : 'none';
        document.getElementById('tab-l').style.color = m === 'l' ? '#1a73e8' : '#777';
        document.getElementById('tab-r').style.color = m === 'r' ? '#1a73e8' : '#777';
    }

    function renderStaff(data) {
        const div = document.getElementById('staff-list-render');
        div.innerHTML = "";
        if(!data) return;
        Object.values(data).forEach(s => {
            div.innerHTML += `
                <div class="staff-item">
                    <div class="staff-head" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                        👤 ${s.user.toUpperCase()} <span>▼</span>
                    </div>
                    <div class="staff-content">
                        <p><b>Clave Actual:</b> ${s.pass}</p>
                        <button class="btn" style="background:#fce8e6; color:red; font-size:12px;" onclick="eliminarStaff('${s.user}')">ELIMINAR ACCESO</button>
                    </div>
                </div>`;
        });
    }

    function renderClientes(data) {
        const div = document.getElementById('render-clientes');
        div.innerHTML = "";
        if(!data) return;
        Object.entries(data).forEach(([key, cli]) => {
            let h = `<div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>${cli.nombre}</strong>
                    <button class="btn" style="width:auto; padding:5px 10px; background:#eee; font-size:11px;" onclick="addMueble('${key}')">+ Artículo</button>
                </div>
                <small>📍 ${cli.direccion}, ${cli.colonia}</small>`;
            if(cli.articulos) {
                Object.entries(cli.articulos).forEach(([aKey, art]) => {
                    h += `<div class="mueble-box ${art.liquidado ? 'liquidado' : ''}" onclick="cobrar('${key}', '${aKey}', ${art.saldo})">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span>${art.nombre}</span>
                            <span style="color:${art.liquidado ? 'green' : 'red'}">$${art.saldo}</span>
                        </div>
                    </div>`;
                });
            }
            div.innerHTML += h + `</div>`;
        });
    }
</script>
</body>
</html>
