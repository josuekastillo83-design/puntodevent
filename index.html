<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXVENTA - todo lo que ocupas en un solo lugar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--accent:#00f2fe;
--bg-body:#f8f9fa;
--bg-card:#fff;
--text:#000;
--nav:#000;
}

.dark{
--bg-body:#121212;
--bg-card:#1e1e1e;
--text:#fff;
}

*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:var(--bg-body);color:var(--text);}

/* SPLASH */
#splash{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
color:#fff;
}

.logo{font-size:3em;font-weight:300;}
.logo span{color:var(--accent);font-weight:600;}
.slogan{color:#777;margin-top:10px;}

.loader{
margin-top:25px;
width:40px;height:40px;
border:4px solid #222;
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* NAV */
#main-app{display:none;}
.navbar{display:flex;overflow:auto;background:#000;}
.navbar button{
flex:1;
padding:15px;
border:none;
background:none;
color:#666;
}
.navbar button.active{color:var(--accent);border-bottom:2px solid var(--accent);}

.section{display:none;padding:15px;}
.section.active{display:block;}

.card{
background:var(--bg-card);
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
}

.total{
background:#000;
color:#fff;
padding:20px;
text-align:center;
border-radius:20px;
margin-bottom:15px;
}
.total h1{color:var(--accent);}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<div class="logo">NEX<span>VENTA</span></div>
<div class="slogan">todo lo que ocupas en un solo lugar</div>
<div class="loader"></div>
</div>

<!-- APP -->
<div id="main-app">

<div class="navbar">
<button class="active" onclick="show('pos',this)">Caja</button>
<button onclick="show('stock',this)">Stock</button>
<button onclick="show('fiados',this)">Fiados</button>
<button onclick="show('corte',this)">Corte</button>
</div>

<!-- CAJA -->
<div id="pos" class="section active">
<input id="sku" placeholder="Escanear o escribir producto">
<button onclick="addCart()">Agregar</button>

<div id="cart"></div>

<div class="total">
<small>Total</small>
<h1 id="total">$0</h1>
</div>

<button onclick="pagar()">Finalizar venta</button>
</div>

<!-- STOCK -->
<div id="stock" class="section">
<div class="card">
<input id="p-nombre" placeholder="Nombre">
<input id="p-precio" type="number" placeholder="Precio">
<input id="p-stock" type="number" placeholder="Stock">
<button onclick="addProd()">Guardar</button>
</div>

<div id="lista"></div>
</div>

<!-- FIADOS -->
<div id="fiados" class="section">
<div id="listaFiados"></div>
</div>

<!-- CORTE -->
<div id="corte" class="section">
<div class="card">
<h2>Ganancia</h2>
<h1 id="ganancia">$0</h1>
<button onclick="reset()">Cerrar día</button>
</div>
</div>

</div>

<script>

// SPLASH
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("main-app").style.display="block";
},2500);

// NAV
function show(id,btn){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".navbar button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

// DATA
let inv=JSON.parse(localStorage.getItem("inv"))||[];
let cart=[];
let ganancia=0;

// STOCK
function addProd(){
let n=document.getElementById("p-nombre").value;
let p=parseFloat(document.getElementById("p-precio").value);
let s=parseInt(document.getElementById("p-stock").value);

inv.push({n,p,s});
save();
renderInv();
}

function renderInv(){
document.getElementById("lista").innerHTML=
inv.map(i=>`<div class="card">${i.n} - $${i.p} (${i.s})</div>`).join("");
}

// CAJA
function addCart(){
let name=document.getElementById("sku").value;
let p=inv.find(x=>x.n===name);
if(!p)return alert("No existe");

cart.push(p);
renderCart();
}

function renderCart(){
let t=0;
document.getElementById("cart").innerHTML=
cart.map(i=>{
t+=i.p;
return `<div>${i.n} - $${i.p}</div>`;
}).join("");

document.getElementById("total").innerText="$"+t;
}

function pagar(){
let t=cart.reduce((a,b)=>a+b.p,0);
ganancia+=t;
document.getElementById("ganancia").innerText="$"+ganancia;
cart=[];
renderCart();
save();
}

// SAVE
function save(){
localStorage.setItem("inv",JSON.stringify(inv));
}

// RESET
function reset(){
ganancia=0;
save();
}

// INIT
renderInv();

</script>

</body>
</html>
