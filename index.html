<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>POS Pro - Control de Stock</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gris: #2c3e50; --celeste: #3498db; --verde: #27ae60; --rojo: #e74c3c; --fondo: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--fondo); color: var(--gris); padding-bottom: 80px; }
        header { background: var(--gris); color: var(--celeste); padding: 15px; text-align: center; font-weight: bold; border-bottom: 3px solid var(--celeste); }
        .tab-nav { display: flex; overflow-x: auto; background: #fff; padding: 10px; gap: 8px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 0 0 auto; padding: 10px 18px; background: #eee; border-radius: 20px; font-size: 11px; font-weight: bold; color: #777; }
        .tab.active { background: var(--celeste); color: #fff; }
        .container { padding: 15px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--celeste); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; min-height: 250px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; }
        .btn-verde { background: var(--verde); color: #fff; }
        .btn-celeste { background: var(--celeste); color: #fff; }
        .btn-rojo { background: var(--rojo); color: #fff; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .total-txt { text-align: right; color: var(--celeste); font-size: 32px; font-weight: bold; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; padding: 20px; }
    </style>
</head>
<body>

    <header><h1 id="display-nombre">MI TIENDA</h1></header>

    <div class="tab-nav">
        <div class="tab active" onclick="ver('venta', this)">🛒 VENTA</div>
        <div class="tab" onclick="ver('inv', this)">📦 STOCK</div>
        <div class="tab" onclick="ver('gastos', this)">📉 GASTOS</div>
        <div class="tab" onclick="ver('corte', this)">📊 CORTE</div>
    </div>

    <div class="container">
        <div class="card">
            <div id="reader"></div>
            <p id="scan-info" style="text-align:center; font-size:12px; margin-top:5px; font-weight:bold;"></p>
        </div>

        <div id="sec-venta">
            <div class="card">
                <div id="carrito-lista"></div>
                <div class="total-txt" id="total-txt">$ 0.00</div>
                <button class="btn btn-verde" onclick="abrirCobro()">💰 COBRAR</button>
            </div>
        </div>

        <div id="sec-inv" style="display:none;">
            <div class="card">
                <h3>Ajustes de Tienda</h3>
                <input type="text" id="config-nombre" placeholder="Nombre de tu Negocio">
                <button class="btn btn-celeste" onclick="guardarNombre()">ACTUALIZAR NOMBRE</button>
            </div>
            <div class="card">
                <h3>Registrar Producto</h3>
                <input type="text" id="in-code" placeholder="Código de barras">
                <input type="text" id="in-nom" placeholder="Nombre">
                <input type="number" id="in-pre" placeholder="Precio $">
                <input type="number" id="in-stock" placeholder="Stock Actual">
                <button class="btn btn-celeste" onclick="guardarProd()">💾 GUARDAR</button>
            </div>
            <div class="card"><table style="width:100%; font-size:12px;"><thead><tr style="text-align:left;"><th>Prod</th><th>Stock</th><th>Precio</th></tr></thead><tbody id="l-inv"></tbody></table></div>
        </div>

        <div id="sec-corte" style="display:none;">
            <div class="card">
                <div style="display:flex; justify-content:space-between;"><span>Efectivo:</span><b id="c-efe">$0.00</b></div>
                <div style="display:flex; justify-content:space-between;"><span>Tarjeta:</span><b id="c-tar">$0.00</b></div>
                <div style="display:flex; justify-content:space-between; color:var(--rojo);"><span>Gastos:</span><b id="c-gas">-$0.00</b></div>
                <hr style="margin:10px 0;">
                <div style="display:flex; justify-content:space-between; font-size:20px; color:var(--celeste);"><span>Utilidad:</span><b id="c-util">$0.00</b></div>
                <button class="btn btn-verde" onclick="exportarPDF()">📄 PDF</button>
                <button class="btn btn-rojo" onclick="limp()">BORRAR DÍA</button>
            </div>
        </div>
    </div>

    <div id="modal-cant" class="modal-overlay">
        <div class="card" style="width:100%;">
            <h2 id="n-prod" style="text-align:center;"></h2>
            <p style="text-align:center; font-size:12px; color:var(--rojo);" id="stock-aviso"></p>
            <input type="number" id="i-cant" value="1" style="font-size:30px; text-align:center;">
            <button class="btn btn-verde" onclick="sumarCarr()">AGREGAR</button>
            <button class="btn" onclick="cerrarModalCant()">CANCELAR</button>
        </div>
    </div>

    <div id="modal-cobro" class="modal-overlay">
        <div class="card" style="width:100%;">
            <h2 id="m-tot" style="text-align:center;"></h2>
            <select id="m-metodo"><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option></select>
            <input type="number" id="m-paga" placeholder="¿Con cuánto pagan?">
            <button class="btn btn-verde" onclick="finalizar()">FINALIZAR</button>
            <button class="btn" onclick="cerrarModalCobro()">VOLVER</button>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('pos_v16_db')) || {};
    let vent = JSON.parse(localStorage.getItem('pos_v16_v')) || [];
    let gst = JSON.parse(localStorage.getItem('pos_v16_g')) || [];
    let nTienda = localStorage.getItem('pos_v16_nom') || "MI TIENDA";
    let carr = []; let tot = 0; let sc; let temp; let modo = 'venta'; let esc = false;

    function sonarBip() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function hablar(t) { let m = new SpeechSynthesisUtterance(t); m.lang='es-MX'; window.speechSynthesis.speak(m); }

    function ver(s, btn) {
        modo = s;
        ["sec-venta","sec-inv","sec-corte"].forEach(x=>document.getElementById(x).style.display='none');
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.getElementById('sec-'+s).style.display='block';
        btn.classList.add('active');
        if(s==='inv') rInv(); if(s==='corte') rCorte();
    }

    function init() {
        sc = new Html5Qrcode("reader");
        sc.start({facingMode:"environment"},{fps:20,qrbox:250}, (t)=>{
            if(esc) return; esc = true; sonarBip();
            if(modo === 'venta') {
                if(db[t]) {
                    if(db[t].stock <= 0) { hablar("Sin stock"); alert("Producto agotado"); }
                    else { hablar(db[t].nombre); abrirModalCant(t); }
                } else { hablar("No registrado"); }
            } else if(modo === 'inv') {
                document.getElementById('in-code').value = t;
                if(db[t]) { document.getElementById('in-nom').value = db[t].nombre; document.getElementById('in-pre').value = db[t].precio; }
            }
            setTimeout(()=>esc=false, 2000);
        }).catch(e=>console.log(e));
    }

    function abrirModalCant(t) {
        temp = {...db[t], code: t};
        document.getElementById('n-prod').innerText = temp.nombre;
        document.getElementById('stock-aviso').innerText = "Disponible: " + temp.stock;
        document.getElementById('i-cant').value = 1;
        document.getElementById('modal-cant').style.display = 'flex';
    }

    function sumarCarr() {
        let c = parseInt(document.getElementById('i-cant').value);
        let yaEn = carr.filter(x => x.code === temp.code).length;
        if(temp.stock >= (yaEn + c)) {
            for(let i=0; i<c; i++) carr.push({...temp});
            rCarr(); cerrarModalCant();
        } else { hablar("Stock insuficiente"); alert("Solo quedan " + temp.stock + " piezas"); }
    }

    function rCarr() {
        let l = document.getElementById('carrito-lista'); tot=0; l.innerHTML='';
        let agr = {};
        carr.forEach(i => { if(!agr[i.code]) agr[i.code] = {n: i.nombre, p: i.precio, q: 0}; agr[i.code].q++; tot += i.precio; });
        for(let k in agr) { l.innerHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${agr[k].q}x ${agr[k].n}</span><b>$${(agr[k].p * agr[k].q).toFixed(2)}</b></div>`; }
        document.getElementById('total-txt').innerText = '$ '+tot.toFixed(2);
    }

    function finalizar() {
        let m = document.getElementById('m-metodo').value;
        carr.forEach(i => db[i.code].stock--);
        vent.push({t: tot, m: m, f: new Date().toLocaleString()});
        localStorage.setItem('pos_v16_db', JSON.stringify(db));
        localStorage.setItem('pos_v16_v', JSON.stringify(vent));
        carr=[]; rCarr(); cerrarModalCobro(); alert("Venta Exitosa");
    }

    function guardarProd() {
        let c=document.getElementById('in-code').value, n=document.getElementById('in-nom').value, p=parseFloat(document.getElementById('in-pre').value), s=parseInt(document.getElementById('in-stock').value);
        if(c&&n) { db[c]={nombre:n, precio:p, stock:s}; localStorage.setItem('pos_v16_db', JSON.stringify(db)); rInv(); alert("Guardado"); }
    }

    function guardarNombre() {
        let n = document.getElementById('config-nombre').value;
        if(n) { localStorage.setItem('pos_v16_nom', n); document.getElementById('display-nombre').innerText = n; alert("Nombre actualizado"); }
    }

    function rInv() { let h=''; for(let k in db) h+=`<tr><td>${db[k].nombre}</td><td>${db[k].stock}</td><td>$${db[k].precio}</td></tr>`; document.getElementById('l-inv').innerHTML=h; }
    function rCorte() {
        let e=0, t=0, g=0; vent.forEach(v => { if(v.m==='efectivo') e+=v.t; else t+=v.t; });
        gst.forEach(gs => g += gs.monto);
        document.getElementById('c-efe').innerText = "$"+e.toFixed(2);
        document.getElementById('c-tar').innerText = "$"+t.toFixed(2);
        document.getElementById('c-gas').innerText = "-$"+g.toFixed(2);
        document.getElementById('c-util').innerText = "$"+(e + t - g).toFixed(2);
    }
    function exportarPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(nTienda + " - CORTE", 10, 20); doc.text("Utilidad: " + document.getElementById('c-util').innerText, 10, 40); doc.save("Corte.pdf"); }
    function cerrarModalCant() { document.getElementById('modal-cant').style.display='none'; }
    function cerrarModalCobro() { document.getElementById('modal-cobro').style.display='none'; }
    function abrirCobro() { if(carr.length>0) document.getElementById('modal-cobro').style.display='flex'; document.getElementById('m-tot').innerText="Total: $"+tot.toFixed(2); }
    function limp() { if(confirm("¿Limpiar día?")){ vent=[]; gst=[]; localStorage.setItem('pos_v16_v', JSON.stringify(vent)); localStorage.setItem('pos_v16_g', JSON.stringify(gst)); rCorte(); } }
    
    window.onload = () => { document.getElementById('display-nombre').innerText = nTienda; init(); };
</script>
</body>
</html>
