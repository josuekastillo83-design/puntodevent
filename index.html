<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bitacora Pro - GPS & Buscador</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, get, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7xEDb_sa_C76G6KA5cQMsd3w-h83hpb0",
            authDomain: "bitacoregust.firebaseapp.com",
            databaseURL: "https://bitacoregust-default-rtdb.firebaseio.com",
            projectId: "bitacoregust",
            storageBucket: "bitacoregust.firebasestorage.app",
            messagingSenderId: "155618684015",
            appId: "1:155618684015:web:ebea5a55a678395c9df19a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentOwnerUid = "";
        let isOwner = false;
        let listaClientesOriginal = [];

        // --- AUTH ---
        window.handleAuth = async () => {
            const biz = document.getElementById('l-biz').value.toLowerCase().trim();
            const user = document.getElementById('l-user').value.toLowerCase().trim();
            const pass = document.getElementById('l-pass').value;

            if (user.includes('@')) {
                signInWithEmailAndPassword(auth, user, pass).catch(() => alert("Error Dueño"));
            } else {
                const bSnap = await get(ref(db, `nombres_mueblerias/${biz}`));
                if(!bSnap.exists()) return alert("Mueblería no existe");
                const uid = bSnap.val().ownerUid;
                const sSnap = await get(ref(db, `mueblerias/${uid}/staff/${user}`));
                if(sSnap.exists() && sSnap.val().pass === pass) {
                    localStorage.setItem('staff_session', JSON.stringify({ uid, user, biz }));
                    location.reload();
                } else { alert("Usuario/Clave incorrecta"); }
            }
        };

        // --- GPS: ORDENAR RUTA ---
        window.ordenarPorGps = () => {
            if (!navigator.geolocation) return alert("GPS no soportado");
            
            alert("📍 Calculando ruta más cercana...");
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                const ordenados = listaClientesOriginal.sort((a, b) => {
                    const distA = Math.sqrt(Math.pow(a.lat - lat, 2) + Math.pow(a.lon - lon, 2)) || 999;
                    const distB = Math.sqrt(Math.pow(b.lat - lat, 2) + Math.pow(b.lon - lon, 2)) || 999;
                    return distA - distB;
                });

                render(ordenados, true);
            });
        };

        // --- OPERACIONES ---
        window.crearCliente = () => {
            const nom = document.getElementById('new-cli-nom').value.toUpperCase();
            const dir = document.getElementById('new-cli-dir').value;
            if(!nom) return;

            navigator.geolocation.getCurrentPosition(pos => {
                const id = nom.replace(/\s/g, '_') + "_" + Date.now();
                set(ref(db, `mueblerias/${currentOwnerUid}/clientes/${id}`), {
                    nombre: nom,
                    direccion: dir || "Sin dirección",
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });
                document.getElementById('new-cli-nom').value = "";
                document.getElementById('new-cli-dir').value = "";
            }, () => {
                // Si falla el GPS igual guarda pero sin coordenadas
                const id = nom.replace(/\s/g, '_') + "_" + Date.now();
                set(ref(db, `mueblerias/${currentOwnerUid}/clientes/${id}`), {
                    nombre: nom, direccion: dir || "Sin dirección", lat: 0, lon: 0
                });
            });
        };

        window.addArticulo = (cliId) => {
            const art = prompt("Nombre del artículo:");
            const total = parseFloat(prompt("Precio total:"));
            if(!art || isNaN(total)) return;
            const artId = Date.now();
            update(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliId}/articulos/${artId}`), {
                nombre: art, saldo: total, total: total, estado: 'activo'
            });
        };

        window.registrarAbono = (cliId, artId, saldoActual) => {
            const abono = parseFloat(prompt("Monto del abono:"));
            if(isNaN(abono) || abono <= 0) return;
            let nuevoSaldo = (saldoActual - abono).toFixed(2);
            if(nuevoSaldo < 0) nuevoSaldo = 0;
            update(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliId}/articulos/${artId}`), {
                saldo: parseFloat(nuevoSaldo),
                estado: parseFloat(nuevoSaldo) === 0 ? 'liquidado' : 'activo'
            });
        };

        onAuthStateChanged(auth, user => {
            const staff = JSON.parse(localStorage.getItem('staff_session'));
            document.getElementById('splash').style.display = 'none';
            if (user || staff) {
                currentOwnerUid = user ? user.uid : staff.uid;
                isOwner = !!user;
                document.getElementById('view-auth').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                if(isOwner) document.getElementById('owner-panel').style.display = 'block';
                
                onValue(ref(db, `mueblerias/${currentOwnerUid}/clientes`), s => {
                    const data = s.val() ? Object.values(s.val()) : [];
                    listaClientesOriginal = data;
                    render(data);
                });
            } else {
                document.getElementById('view-auth').style.display = 'flex';
            }
        });
    </script>

    <style>
        :root { --blue: #1a73e8; --green: #2ecc71; --gray: #f1f3f4; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); padding-bottom: 50px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .articulo { border-left: 5px solid var(--blue); padding: 10px; margin: 8px 0; background: #fff; border: 1px solid #eee; border-radius: 8px; border-left-width: 5px; }
        .articulo.liquidado { border-left-color: var(--green); background: #f0fff4; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-gps { background: #34a853; color: white; margin-bottom: 10px; }
        header { background: var(--blue); color: white; padding: 15px; font-weight: bold; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; }
        input { width: 100%; padding: 12px; margin: 5px 0; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .search-box { position: sticky; top: 50px; z-index: 5; background: var(--gray); padding: 5px 10px; }
    </style>
</head>
<body>

    <div id="splash" style="position:fixed; inset:0; background:white; z-index:99; display:flex; justify-content:center; align-items:center;">Cargando...</div>

    <div id="view-auth" style="display:none; flex-direction:column; padding:30px; height:100vh; justify-content:center; background:white;">
        <h2 style="text-align:center;">Bitacora Pro</h2>
        <input type="text" id="l-biz" placeholder="Nombre Mueblería">
        <input type="text" id="l-user" placeholder="Correo o Usuario">
        <input type="password" id="l-pass" placeholder="Contraseña">
        <button class="btn btn-blue" onclick="handleAuth()">ENTRAR</button>
    </div>

    <div id="app" style="display:none;">
        <header>BITACORA PRO <i class="fas fa-sign-out-alt" onclick="localStorage.clear(); location.reload();"></i></header>
        
        <div class="search-box">
            <input type="text" id="main-search" placeholder="🔍 Buscar por nombre o dirección..." onkeyup="filterList()">
            <button class="btn btn-gps btn-blue" onclick="ordenarPorGps()">📍 RUTA MÁS CERCANA (GPS)</button>
        </div>

        <div id="owner-panel" style="display:none;" class="card">
            <h4>Nuevo Cobrador</h4>
            <input type="text" id="new-staff-u" placeholder="Usuario">
            <input type="text" id="new-staff-p" placeholder="Clave">
            <button class="btn btn-blue" onclick="crearStaff()">AÑADIR</button>
        </div>

        <div class="card">
            <h4>Nuevo Cliente</h4>
            <input type="text" id="new-cli-nom" placeholder="NOMBRE COMPLETO">
            <input type="text" id="new-cli-dir" placeholder="DIRECCIÓN / COLONIA">
            <button class="btn btn-blue" onclick="crearCliente()">+ GUARDAR CLIENTE</button>
        </div>

        <div id="c-list"></div>
    </div>

<script>
    function render(clientes, isSorted = false) {
        const div = document.getElementById('c-list');
        div.innerHTML = "";
        if(!clientes) return;

        clientes.forEach(cli => {
            const cliId = cli.nombre.replace(/\s/g, '_');
            let html = `<div class="card client-item" data-nombre="${cli.nombre}" data-dir="${cli.direccion}">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <strong style="font-size:1.1rem;">👤 ${cli.nombre}</strong><br>
                        <small style="color:#666;">📍 ${cli.direccion}</small>
                    </div>
                </div>
                <button class="btn btn-add" style="background:#eee; margin-top:10px; font-size:11px;" onclick="addArticulo('${cliId}')">+ Agregar Mueble</button>
                <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">`;

            if(cli.articulos) {
                Object.entries(cli.articulos).forEach(([aId, art]) => {
                    html += `<div class="articulo ${art.estado === 'liquidado' ? 'liquidado' : ''}" onclick="registrarAbono('${cliId}', '${aId}', ${art.saldo})">
                        <div style="display:flex; justify-content:space-between; font-weight:bold;">
                            <span>${art.nombre}</span>
                            <span style="color:${art.saldo === 0 ? 'green' : '#d32f2f'}">$${art.saldo}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#888; margin-top:5px;">
                            <span>Total: $${art.total}</span>
                            <span>${art.estado.toUpperCase()}</span>
                        </div>
                    </div>`;
                });
            }
            html += `</div>`;
            div.innerHTML += html;
        });
    }

    function filterList() {
        const query = document.getElementById('main-search').value.toLowerCase();
        const cards = document.querySelectorAll('.client-item');
        cards.forEach(card => {
            const nom = card.getAttribute('data-nombre').toLowerCase();
            const dir = card.getAttribute('data-dir').toLowerCase();
            card.style.display = (nom.includes(query) || dir.includes(query)) ? 'block' : 'none';
        });
    }

    window.crearStaff = () => {
        const u = document.getElementById('new-staff-u').value.toLowerCase().trim();
        const p = document.getElementById('new-staff-p').value;
        const bizRef = firebase.database().ref(`mueblerias/${currentOwnerUid}/staff/${u}`);
        bizRef.set({ user: u, pass: p });
    };
</script>
</body>
</html>
