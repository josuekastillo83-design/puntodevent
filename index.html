<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AboneroApp - Control Maestro</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7xEDb_sa_C76G6KA5cQMsd3w-h83hpb0",
            authDomain: "bitacoregust.firebaseapp.com",
            databaseURL: "https://bitacoregust-default-rtdb.firebaseio.com",
            projectId: "bitacoregust",
            storageBucket: "bitacoregust.firebasestorage.app",
            messagingSenderId: "155618684015",
            appId: "1:155618684015:web:ebea5a55a678395c9df19a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- SISTEMA DE USUARIOS PERSONALIZADOS ---

        // Función para que el Dueño cree un cobrador (Nombre de usuario en lugar de correo)
        window.crearCobrador = () => {
            const user = auth.currentUser;
            const nuevoUser = document.getElementById('new-user').value.toLowerCase().trim();
            const nuevaPass = document.getElementById('new-pass').value.trim();

            if(!nuevoUser || !nuevaPass) return alert("Completa los datos del cobrador.");

            // Guardamos el cobrador bajo el ID del dueño
            set(ref(db, `mueblerias/${user.uid}/staff/${nuevoUser}`), {
                password: nuevaPass,
                nombre: nuevoUser
            }).then(() => {
                alert(`✅ Cobrador "${nuevoUser}" creado. Ya puede iniciar sesión.`);
                document.getElementById('new-user').value = "";
                document.getElementById('new-pass').value = "";
            });
        };

        // Login Especial (Detecta si es Dueño o Cobrador por nombre)
        window.handleLoginMaster = async () => {
            const inputUser = document.getElementById('login-email').value.toLowerCase().trim();
            const inputPass = document.getElementById('login-pass').value;

            // Si el input contiene @, intentamos login como Dueño (Firebase Auth)
            if(inputUser.includes('@')) {
                signInWithEmailAndPassword(auth, inputUser, inputPass).catch(() => alert("Error en cuenta maestra."));
            } else {
                // Si no tiene @, buscamos en la base de datos de Staff
                const bizId = document.getElementById('login-biz-id').value.trim(); // Necesitamos el ID del dueño
                if(!bizId) return alert("Ingresa el ID de la Mueblería proporcionado por tu patrón.");

                const path = `mueblerias/${bizId}/staff/${inputUser}`;
                const snapshot = await get(ref(db, path));
                
                if(snapshot.exists() && snapshot.val().password === inputPass) {
                    // Login simulado para cobradores usando una sesión persistente local
                    localStorage.setItem('abonero_staff_session', JSON.stringify({
                        bizId: bizId,
                        user: inputUser
                    }));
                    location.reload(); // Recargamos para activar la sesión de staff
                } else {
                    alert("❌ Usuario o clave de cobrador incorrecta.");
                }
            }
        };

        window.handleLogout = () => {
            localStorage.removeItem('abonero_staff_session');
            signOut(auth);
        };

        // Monitor de Sesión Dual
        onAuthStateChanged(auth, user => {
            const staffSession = JSON.parse(localStorage.getItem('abonero_staff_session'));
            const splash = document.getElementById('splash-screen');

            if (user || staffSession) {
                document.getElementById('view-login').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                
                const finalId = user ? user.uid : staffSession.bizId;
                
                // Si es dueño, mostrar panel de control de staff
                if(user) document.getElementById('panel-admin').style.display = 'block';
                
                // Cargar Clientes
                onValue(ref(db, `mueblerias/${finalId}/clientes`), snap => {
                    renderClients(snap.val(), finalId);
                });
            } else {
                document.getElementById('view-login').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
            splash.style.display = 'none';
        });

        window.saveClient = () => {
            const staffSession = JSON.parse(localStorage.getItem('abonero_staff_session'));
            const finalId = auth.currentUser ? auth.currentUser.uid : staffSession.bizId;
            
            const nom = document.getElementById('reg-nom').value.toUpperCase().trim();
            const saldo = parseFloat(document.getElementById('reg-saldo').value);

            set(ref(db, `mueblerias/${finalId}/clientes/${nom.replace(/\./g, '_')}`), {
                nombre: nom,
                direccion: document.getElementById('reg-dir').value,
                saldo: saldo,
                historial: []
            }).then(() => {
                showView('v-ruta');
                document.querySelectorAll('input').forEach(i => i.value = "");
            });
        };
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f1f3f4; --dark: #202124; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); color: white; }
        .view { display: none; padding: 15px; }
        .view.active { display: block; }
        #view-login { height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 30px; background: white; text-align: center; }
        .badge-admin { background: #e8f0fe; color: var(--primary); padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div id="splash-screen" style="position:fixed; inset:0; background:white; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <img src="1000123395.png" style="width:150px;">
    </div>

    <div id="view-login" style="display:none;">
        <img src="1000123395.png" style="width:100px; margin-bottom:15px;">
        <h2>AboneroApp Pro</h2>
        
        <div id="staff-fields" style="width:100%; max-width:320px;">
            <input type="text" id="login-biz-id" placeholder="ID de la Mueblería (Solo cobradores)">
            <input type="text" id="login-email" placeholder="Usuario o Correo">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button class="btn btn-main" onclick="handleLoginMaster()">INICIAR SESIÓN</button>
            <p style="font-size: 11px; color: #666; margin-top: 15px;">DUEÑOS: Usen su correo y clave.<br>COBRADORES: Usen su nombre de usuario e ID de negocio.</p>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header>
            <div style="font-weight: 900;">ABONEROAPP PRO</div>
            <i class="fas fa-sign-out-alt" onclick="handleLogout()"></i>
        </header>

        <div class="view active" id="v-ruta">
            <div id="panel-admin" style="display:none;" class="card">
                <h4 style="margin:0; color:var(--primary);">Panel de Dueño</h4>
                <p style="font-size:11px; color:#666;">Crea cuentas para tus cobradores sin correos:</p>
                <input type="text" id="new-user" placeholder="Nombre de usuario (ej: juan01)">
                <input type="text" id="new-pass" placeholder="Contraseña para él">
                <button class="btn btn-main" style="padding:10px;" onclick="crearCobrador()">+ CREAR COBRADOR</button>
            </div>

            <div id="lista-clientes" style="margin-top:15px;"></div>
            
            <button class="btn btn-main" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:30px; box-shadow:0 4px 10px rgba(0,0,0,0.3);" onclick="showView('v-nueva')">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <div id="v-nueva" class="view">
            <div class="card">
                <h3>Nueva Venta</h3>
                <input type="text" id="reg-nom" placeholder="Nombre">
                <input type="text" id="reg-dir" placeholder="Dirección">
                <input type="number" id="reg-saldo" placeholder="Saldo $">
                <button class="btn btn-main" onclick="saveClient()">GUARDAR</button>
                <button class="btn" style="background:#eee; margin-top:10px;" onclick="showView('v-ruta')">CANCELAR</button>
            </div>
        </div>
    </div>

<script>
    function renderClients(data, uid) {
        const list = document.getElementById('lista-clientes');
        list.innerHTML = "";
        if(!data) return list.innerHTML = "<p style='text-align:center;'>Sin clientes.</p>";
        Object.values(data).forEach(cli => {
            list.innerHTML += `<div class="card"><strong>${cli.nombre}</strong><br>Saldo: $${cli.saldo}</div>`;
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
