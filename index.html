<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bitacora Pro - Sistema Global</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, get, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7xEDb_sa_C76G6KA5cQMsd3w-h83hpb0",
            authDomain: "bitacoregust.firebaseapp.com",
            databaseURL: "https://bitacoregust-default-rtdb.firebaseio.com",
            projectId: "bitacoregust",
            storageBucket: "bitacoregust.firebasestorage.app",
            messagingSenderId: "155618684015",
            appId: "1:155618684015:web:ebea5a55a678395c9df19a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentOwnerUid = "";
        let role = ""; 

        const DATA_CP = {
            "65750": { mun: "Gral. Zuazua", cols: ["Centro Zuazua", "Real de Zuazua", "Portal del Norte"] },
            "65760": { mun: "Gral. Zuazua", cols: ["Real Palmas", "Valle de Santa Elena", "Misión de Santa Elena"] },
            "66650": { mun: "Pesquería", cols: ["Centro Pesquería", "Colinas del Aeropuerto"] },
            "66653": { mun: "Pesquería", cols: ["Villas Regina", "Paseo Lindavista"] },
            "66670": { mun: "Pesquería", cols: ["Valle de Santa María", "Lomas de Pesquería"] }
        };

        // --- NOTIFICACIONES PRO ---
        window.notificar = (msg, color = "#0056b3") => {
            const m = document.getElementById('b-modal');
            document.getElementById('m-msg').innerText = msg;
            document.querySelector('.m-header').style.background = color;
            m.style.display = 'flex';
        };

        // --- AUTH: ENTRAR Y REGISTRAR ---
        window.handleAuth = async () => {
            const biz = document.getElementById('l-biz').value.toLowerCase().trim();
            const user = document.getElementById('l-user').value.toLowerCase().trim();
            const pass = document.getElementById('l-pass').value;

            // Cambiado a browserLocalPersistence para que el Dueño no se cierre solo
            await setPersistence(auth, browserLocalPersistence);

            if (user.includes('@')) {
                signInWithEmailAndPassword(auth, user, pass).catch(e => notificar("Error: " + e.message, "red"));
            } else {
                if(!biz) return notificar("Ingresa nombre de Mueblería");
                // BUSQUEDA GLOBAL DE LA MUEBLERÍA
                const bSnap = await get(ref(db, `nombres_mueblerias/${biz}`));
                if(!bSnap.exists()) return notificar("Mueblería no registrada", "#ff8c00");
                
                const uid = bSnap.val().ownerUid;
                const sSnap = await get(ref(db, `mueblerias/${uid}/staff/${user}`));
                
                if(sSnap.exists() && sSnap.val().pass === pass) {
                    sessionStorage.setItem('staff_session', JSON.stringify({ uid, user, biz }));
                    location.reload();
                } else { notificar("Usuario o Clave incorrecta", "red"); }
            }
        };

        window.registerOwner = () => {
            const biz = document.getElementById('r-biz').value.toLowerCase().trim();
            const email = document.getElementById('r-email').value.trim();
            const pass = document.getElementById('r-pass').value;
            if(!biz || !email || pass.length < 6) return notificar("Datos incompletos");

            createUserWithEmailAndPassword(auth, email, pass).then(u => {
                // GUARDAR EN RUTA GLOBAL PARA QUE OTROS TELÉFONOS LA VEAN
                set(ref(db, `nombres_mueblerias/${biz}`), { ownerUid: u.user.uid });
                set(ref(db, `mueblerias/${u.user.uid}/config`), { nombreBiz: biz });
                notificar("✅ Mueblería Registrada");
                location.reload();
            }).catch(e => notificar(e.message, "red"));
        };

        // --- MONITOR DE INTERFAZ ---
        onAuthStateChanged(auth, user => {
            const staff = JSON.parse(sessionStorage.getItem('staff_session'));
            document.getElementById('splash').style.display = 'none';
            
            if (user || staff) {
                currentOwnerUid = user ? user.uid : staff.uid;
                role = user ? "owner" : "staff";
                document.getElementById('view-auth').style.display = 'none';
                
                if(role === "owner") {
                    document.getElementById('ui-owner').style.display = 'block';
                    onValue(ref(db, `mueblerias/${currentOwnerUid}/staff`), s => renderStaff(s.val()));
                } else {
                    document.getElementById('ui-staff').style.display = 'block';
                }
                onValue(ref(db, `mueblerias/${currentOwnerUid}/clientes`), s => renderClientes(s.val()));
            } else {
                document.getElementById('view-auth').style.display = 'flex';
            }
        });

        // --- DUEÑO: GESTIÓN ---
        window.crearStaff = () => {
            const u = document.getElementById('new-u').value.trim();
            const p = document.getElementById('new-p').value.trim();
            if(!u || !p) return;
            set(ref(db, `mueblerias/${currentOwnerUid}/staff/${u}`), { pass: p, user: u })
            .then(() => notificar("Cobrador Guardado", "green"));
        };

        window.eliminarStaff = (u) => { 
            if(confirm(`¿Baja definitiva a ${u}?`)) remove(ref(db, `mueblerias/${currentOwnerUid}/staff/${u}`)); 
        };

        // --- STAFF: OPERACIÓN ---
        window.buscarCP = (cp) => {
            const data = DATA_CP[cp];
            const sel = document.getElementById('c-col');
            if(data) {
                document.getElementById('c-mun').value = data.mun;
                sel.innerHTML = data.cols.map(c => `<option value="${c}">${c}</option>`).join('');
                sel.disabled = false;
            }
        };

        window.crearCliente = () => {
            const nom = document.getElementById('c-nom').value.toUpperCase().trim();
            if(!nom) return notificar("Nombre vacío");
            push(ref(db, `mueblerias/${currentOwnerUid}/clientes`), {
                nombre: nom,
                direccion: document.getElementById('c-dir').value,
                colonia: document.getElementById('c-col').value,
                cp: document.getElementById('c-cp').value
            }).then(() => notificar("Cliente Guardado", "green"));
        };

        window.addArticulo = (cliKey) => {
            const art = prompt("Artículo:");
            const total = parseFloat(prompt("Total:"));
            if(!art || isNaN(total)) return;
            push(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliKey}/articulos`), {
                nombre: art, saldo: total, total: total, liquidado: false
            });
        };

        window.cobrar = (cliKey, artKey, saldoActual) => {
            const abono = parseFloat(prompt(`Saldo: $${saldoActual}. ¿Abono?`));
            if(isNaN(abono) || abono <= 0) return;
            let nSaldo = (saldoActual - abono).toFixed(2);
            if(nSaldo <= 0) nSaldo = 0;
            update(ref(db, `mueblerias/${currentOwnerUid}/clientes/${cliKey}/articulos/${artKey}`), {
                saldo: parseFloat(nSaldo), liquidado: parseFloat(nSaldo) === 0
            });
        };
    </script>

    <style>
        :root { --blue: #004085; --orange: #fd7e14; --green: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        header { background: var(--blue); color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        
        #b-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .m-box { background: white; width: 85%; max-width: 380px; border-radius: 15px; overflow: hidden; text-align: center; }
        .m-header { background: var(--blue); color: white; padding: 15px; font-weight: bold; }
        .m-body { padding: 25px; color: #333; }

        .acc-head { background: #e9ecef; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; border-radius: 8px; margin-top: 10px; }
        .acc-content { display: none; padding: 12px; background: white; border: 1px solid #eee; }
        .art-box { border-left: 5px solid var(--blue); background: #f8f9fa; padding: 10px; margin-top: 10px; border-radius: 5px; }
        .art-box.liquidado { border-left-color: var(--green); background: #d4edda; }
    </style>
</head>
<body>

    <div id="splash" style="position:fixed; inset:0; background:white; z-index:1000; display:flex; justify-content:center; align-items:center;"><img src="1000123395.png" style="width:100px;"></div>

    <div id="b-modal">
        <div class="m-box">
            <div class="m-header">Bitacora Pro</div>
            <div class="m-body" id="m-msg"></div>
            <button class="btn btn-blue" onclick="document.getElementById('b-modal').style.display='none'" style="border-radius:0;">ACEPTAR</button>
        </div>
    </div>

    <div id="view-auth" style="display:none; flex-direction:column; padding:30px; height:100vh; justify-content:center; background:white;">
        <h2 style="text-align:center; color:var(--blue);">Bitacora Pro</h2>
        <div style="display:flex; justify-content:center; gap:30px; margin-bottom:20px;">
            <b id="tl" onclick="showAuth('l')" style="color:var(--blue); border-bottom:2px solid var(--blue); cursor:pointer;">ENTRAR</b>
            <b id="tr" onclick="showAuth('r')" style="color:#999; cursor:pointer;">NUEVA MUEBLERÍA</b>
        </div>
        <div id="fl">
            <input type="text" id="l-biz" placeholder="Nombre Mueblería (Ej: olimpo)">
            <input type="text" id="l-user" placeholder="Correo o Usuario">
            <input type="password" id="l-pass" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="handleAuth()">INGRESAR</button>
        </div>
        <div id="fr" style="display:none;">
            <input type="text" id="r-biz" placeholder="Nombre de tu Mueblería">
            <input type="email" id="r-email" placeholder="Correo Maestro">
            <input type="password" id="r-pass" placeholder="Clave Maestra">
            <button class="btn btn-blue" onclick="registerOwner()">CREAR NEGOCIO</button>
        </div>
    </div>

    <div id="ui-owner" style="display:none;">
        <header>ADMINISTRACIÓN <i class="fas fa-power-off" onclick="location.reload();"></i></header>
        <div class="card">
            <h4 style="margin:0; color:var(--blue);">Panel de Staff</h4>
            <input type="text" id="new-u" placeholder="Usuario Cobrador">
            <input type="text" id="new-p" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="crearStaff()">AÑADIR COBRADOR</button>
            <div id="staff-render"></div>
        </div>
    </div>

    <div id="ui-staff" style="display:none;">
        <header>COBRANZA <i class="fas fa-power-off" onclick="location.reload();"></i></header>
        <div class="card">
            <h4>Nueva Venta</h4>
            <input type="text" id="c-nom" placeholder="NOMBRE CLIENTE">
            <input type="number" id="c-cp" placeholder="C.P. (Zuazua/Pesquería)" oninput="buscarCP(this.value)">
            <select id="c-col" disabled><option>Ingresa C.P.</option></select>
            <input type="text" id="c-mun" placeholder="Municipio" readonly>
            <input type="text" id="c-dir" placeholder="CALLE Y NÚMERO">
            <button class="btn btn-blue" onclick="crearCliente()">GUARDAR CLIENTE</button>
        </div>
        <div id="staff-clientes-render"></div>
    </div>

<script>
    function showAuth(m) {
        document.getElementById('fl').style.display = m === 'l' ? 'block' : 'none';
        document.getElementById('fr').style.display = m === 'r' ? 'block' : 'none';
        document.getElementById('tl').style.color = m === 'l' ? '#004085' : '#999';
        document.getElementById('tr').style.color = m === 'r' ? '#004085' : '#999';
    }

    function renderStaff(data) {
        const div = document.getElementById('staff-render');
        div.innerHTML = "";
        if(!data) return;
        Object.values(data).forEach(s => {
            div.innerHTML += `
                <div class="acc-head" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                    👤 ${s.user.toUpperCase()} <span>▼</span>
                </div>
                <div class="acc-content">
                    <p>Clave: ${s.pass}</p>
                    <button class="btn" style="background:#f8d7da; color:red;" onclick="eliminarStaff('${s.user}')">ELIMINAR ACCESO</button>
                </div>`;
        });
    }

    function renderClientes(data) {
        const target = role === "owner" ? document.getElementById('ui-owner') : document.getElementById('ui-staff');
        let listDiv = document.getElementById('clientes-list-box');
        if(!listDiv) {
            listDiv = document.createElement('div');
            listDiv.id = 'clientes-list-box';
            target.appendChild(listDiv);
        }
        listDiv.innerHTML = "";
        if(!data) return;
        Object.entries(data).forEach(([key, cli]) => {
            let h = `<div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${cli.nombre}</strong>
                    <button class="btn" style="width:auto; padding:5px 10px; background:#eee; font-size:11px;" onclick="addArticulo('${key}')">+ Artículo</button>
                </div>
                <small>📍 ${cli.direccion}, ${cli.colonia}</small>`;
            if(cli.articulos) {
                Object.entries(cli.articulos).forEach(([aKey, art]) => {
                    h += `<div class="art-box ${art.liquidado ? 'liquidado' : ''}" onclick="cobrar('${key}', '${aKey}', ${art.saldo})">
                        <div style="display:flex; justify-content:space-between;">
                            <span>${art.nombre}</span>
                            <b style="color:${art.liquidado ? 'green' : 'red'}">$${art.saldo}</b>
                        </div>
                    </div>`;
                });
            }
            listDiv.innerHTML += h + `</div>`;
        });
    }
</script>
</body>
</html>
